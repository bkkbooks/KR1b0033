body:
  text: 書義斷法卷二元陳恱道撰夏書禹貢禹敷土隨山刋木奠高山大川禹貢一書載禹敷治水土之法史官既以詳載其事而於其篇首復以二語總括之盖洪水横流九州一壑予乗四載猶慮草木之暢茂道梗不通遂隨山澤而焚之以刋其壅蔽此一時之權宜也九州之山各有高者如幽州之山鎮曰醫無閭之類九州之川各有大者如冀之九河荆之九江擇其高大而定之以示其表識此萬世之定制也道路無壅山川有别然後得以施其平治水土之功即此篇之末所謂九山刋旅九川滌源者也冀州既載壺口治梁及岐既修太原至于岳陽覃懐底績至于衡漳不言冀州之疆界所以尊京師必詳水勢之源流所以明河道地勢未有尊於京師者故但書冀州而不言州域之所距水勢未有重於河道者故隨山濬川而詳言河流之所歸盖壺口梁岐之山皆由重鎮而開河源也修太原而至於岳陽之山下治覃懐而至於衡漳之合流皆通汾水而合河流也禹治水之法與夫禹貢之書法槩可見矣淮海惟揚州彭蠡既豬陽鳥攸居揚州之域淮在其東海在其南書淮海所以見東南之奥區為水勢之都㑹也揚州之地彭蠡所豬陽鳥所居所以見水性物性之復常為水患之平也揚州之水不費䟽鑿故但書二水以見大川之奠繼書二事以見大患之平此禹貢書法也厥田惟下下厥賦下上上錯厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢掦州為東南之奥區雖曰田土在九等最下賦乃第七錯出六等則以其人工脩也不特人工之脩而又地産之羙南金之與瑶琨竹木之與羽毛齒革皆足以為貢備器用車甲旌旄之飾棟宇器械之用無不畢備至於一草一木亦皆足以成服而供職篚結實而供祭祀是其物産之羙與人工之脩皆足以補地利之缺此禹貢之紀掦州所以獨詳而下下之田不嫌於下上上之等九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同九州攸同盖言禹之平水土極九州而無不同也然九州之同必由於四海之㑹同者以其隨山濬川源流無不順濬畎澮距川高下無不平也九山為水之源言其高者隩陂為地之卑言其下者禹之治水行其所無事䟽而導之皆合於一海於是水有所歸而功無不及聖人一視同仁之心於是少遂矣六府孔脩庻土交正底慎財賦咸則三壌成賦中邦聖人之治九州其始也因天地生成之利其終也制中國貢賦之法盖六府脩而後庻土正庻土正而後財賦出然必因九州之糓土以定其髙下成中國之田賦而畧於荒遠盖用天之道因地之利而後治之以中國之道皆非強之以其所無也孟子云欲輕於堯舜之道者大貊小貊也欲重於堯舜之道者大桀小桀也中國之治如此五子之歌闕書義斷法卷二
