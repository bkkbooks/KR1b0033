body:
  text: 附作義要訣新安倪士毅輯按宋初因唐制取士試詩賦省題詩及八韻律賦至神宗朝王安石為相熙寧四年辛亥議更科舉法罷詩賦以經義論䇿試士各占治詩書易周禮禮記各一經此經義之始也宋之盛時如張公才叔自靖義正今日作經者所當以為標凖至宋季則其篇甚長有定格律首有破題破題之下有接題接題第一接或二三句或四句下有反接然亦有正説而不反説者有小講小講首有引入題語有小講上假上假畢有過假語然後有下假有繳結以上謂之冒子然後入官題官題之下有原題原題有起語應語結語然後有正假或又有反假次有繳詰有大講有上假有過假有下假有餘意亦曰從講有原經有結尾篇篇按此次序其文多拘於捉對大抵冗長繁復可厭宜今日又變更之今之經義不拘格律然亦當分冒題原題講題結題四假愚往年見𢎞齋曹公宋季書義説嘗取其可用於今日者摘録之兹又見南忩謝氏臨川章氏及諸家之説遂重加編輯條具如在以便初學云謝氏章氏説已載舉業筌蹄中兹不復録𢎞齋曹氏涇曰作文各自有體或簡或詳或雄健或穩妥不可以一律論蓋文氣隨人資稟清濁厚薄所賦不同則文辭隨之然未有無法度而猶可以言文者度者何有開必有合有喚必有應首尾當照應抑掦當相發血脈宜串精神宜壯如人一身自首至足缺一不可則是一篇之中逐假逐節逐句逐字皆不可以不密也又曰文字大概以純者為合格健者為有氣合格者中程度有氣者起人眼目然今人作文於二者皆易有病蓋似純者無氣焰則率略委靡又不足以起人眼目似健者多草野則夾雜怪僻又不可以合有司程度如愚所見當於規矩之中用老蒼之體庶幾合格則不為有司所擯出竒則又非低手可及必識此意乃可進步又論立説大要曰主張題目第一要識得道理透徹第二要識得經文本旨分曉第三要識得古今治亂安危之大體然後一見題目胸中便有稱量然又須多看他人立意及自去歷練則胸中自然開廣又不要雷同將文公四書子細玩味及伊洛議論大概皆要得知則不但區處性理題目有斷制凡是題目皆識輕重皆區處得理到若所謂經旨者亦試言其概唐虞題目須要識得他氣象渾厚處湯武征伐須要見他不得已處商盤周誥須要見他忠厚處如大禹治水之行所無事太甲之悔過伊尹一德之告歸盤庚遷亳之為民高宗之有志中興洛誥之倚重周公及周公切切告歸之意君奭之挽留與夫無逸之本旨及化商一切事體皆大勢所重也則就這上立意得切者最好自此之外亦難盡言或題目散頭緒多我須與他提一箇大頭腦如王會龍省試義提道字串是也其題目云道積于厥躬惟教學半念終始典于學厥德修罔覺監于先王成憲其永無愆惟説式克欽承旁招俊又王會龍義起語云人君道與心為一既欲參古人之善而無愧大臣心與君為一猶欲取天下之善而無遺蓋道無終窮不在吾身則在古人或在天下君不自聖而益求乎古臣不恃君之聖而益求乎賢此所以能致其君之備道也歟或捉題字做綱目亦如王會龍之提道是也或用經句最切者如周明之百志惟熙之題以勿忘勿助為主是也明之義愚未之見如林逄龍太學發解義以有德必有言為主亦是也其題目云德無常師主善為師善無常主協于克一俾萬姓咸曰大哉王言逄龍接題云有德者必有言惟德之會於吾心者既極其精微則言之散於天下者皆稱其廣大有如德之所在苛擇焉而不精則言之所發必言焉而不詳矣何以為大公至正之論而息夫人之異論也哉此伊尹之告太甲蓋欲其以德之一為言之大也餘皆不可以盡言但緊要者一題須要截得上下住須提得緊要處重其細碎處放輕不妨有道理合經旨又不雷同又教人一見便曉如此便是主張大概以此立心以此用工自當有所見也或曰行文關鍵則響常讀熟做熟則行文自然熟凡做商周題用唐虞事則精神壯觀做唐虞題用商周事則不甚好大凡義不必長亦不必短在措辭如何耳長而轉換新意不害其為長短而曲折意盡不害其為短務高則多涉於僻欲新則類入於怪晦則讀之使人厭淺則讀之使人輕下字惡夫俗而造作太過則語澀主意惡夫同而搜索太甚則理背皆學者所當知也又凡做君題國家題反處不可太甚只須輕輕説過存庵胡氏初翁曰聞之前輩凡做唐虞題目不尚反蓋彼時無此等不好氣象也論冒題或曰破題為一篇綱領至不可茍句法以體面為貴而包括欲其盡題句多則融化不見其不足題字少則敷演不見其有餘命意渾涵而不失於迂用字親切而不病於俗斯得之矣接題所以承接破題之意一篇主意要盡見於二三句中尤不可不用工也或曰冒頭如人頭面著不得十分多肉肉多則如有肥氣不雅觀也原題𢎞齋曹氏曰原題之體其文當圓其體當似論前輩考校多於題下看人筆端須是見識高看文字多方於此有議論慷慨之體中間最不要露圭角又不要作成假對文只要參差呼喚圓轉可觀大抵是喚起之後便應一應結一結然後正一假反一假又總繳結此為正體其反説者不必多比正假宜減大半又或有於正假後復作一假或是引事或是譬喻如此議論竟不必作反假亦可也講題愚按舊義必有餘意及考經亦曰原經今日固不拘此然遇可用處亦宜用之但不必拘泥耳𢎞齋論餘意原經二條摘録于後變而通之存乎其人若用亦只數句拈揆足矣不可失之太多也𢎞齋曹氏曰所謂餘意乃是本題主意外尚有未盡之意則於此發之須是意新又不背主意仍於主意有情乃可這個有數樣本意所輕者於此却微與提起本題頭緒多者此處與貫而一之本意作兩俜不相關者此處與發明之本意有自本至效者此又翻轉來言之若只是本題意又來説作一片全無些幹運則徒勞耳又曰當初所以有原經者須是説這箇題目其來歷次第如何或是誰人做底事他這事是如何或是誰人説底話他這話是如何要推尋來因究竟下稍結殺方謂之原經也第一要認他先後次序倫理分曉及提得箇血脈端正然後擺布做來且如大概稱頌事實之題當旁引事實來證主意分輕重呼喚方引入本題出處更自與他照應議論然後結之此格甚平正初無難也若是戒告之題須要認他先後次序如太甲上中下三篇及一德之書盤庚上中下三篇周家大誥東征召誥營洛多士遷商民這箇先後之次截然最要鋪擺仔細又不但篇目次第只一假中亦要分次第不可截斷如本題係是在前則起頭宜作議論一喚喚動即就題目説來便就此解他正意這回方才迤邐轉去尋後面事使去云不特此爾後面又作如此説下梢又是如何却於本題後引來擁從之結之此一體也如本題係是在後則當起頭逐一原去其初是如何中間又如何乃引入本題却作一小片議論而結之又一體也引事不在多只要精切我得一句是切只就此一句發明全靠善於幹運耳凡引事寧可真而少不可多而雜最要識此意要之大概起頭多是引證中間便當喚出出處然後便當解意分曉結之此又大概原經之法也結題𢎞齋曹氏曰結尾亦要識體格不但用事證題而已若本題係有大節目事體則宜就此究竟到實結裏處結之此為議論到底是一格也本題用經句主張有來歷者宜於結尾喚起出處狀得分曉此有根據有首尾文字是一格也此外又有定格説唐虞治體宜以成王對之説盤庚遷亳事宜以周家化商事證之皇極之説宜以聖門事證之二典三謨亦然湯武征伐宜相照證周召告歸可互參考三后化商皆要相串最宜識此意其他方可泛引事證耳又或本題中實有議論未盡而道理實有當發揮者又當作一假議論不必用事亦可也引事之體既引狀本題後又須更喚起一喚以已意慷慨議論斷制主意教他響朗然後結之此可以見人筆力宜耐心加工也又總論于後曰以上亦據所見略言之耳其詳不可盡也在乎即類推之以心體之自求其意於外而得胸中之活法乃有實工夫耳要是下筆之時説得首尾照應串得針線細密步步思量主意句句挑得明緊教他讀去順溜又大概文字全在呼喚有時數句全在數箇字挑剔得好須是十倍精神自此之外又有一項法度一篇之中凡於過假接頭處當教他轉得全不費力而又有新體此雖小節亦看人手假如陳懋欽省試會其有極義自接題小講及原題講假原經結尾一切轉頭處並不用尋常套子如嘗謂今夫之類舊義多用嘗謂二字作原題起語今夫二字作大講起語蓋只教他人不見痕迹而又自是轉換最妙者有江萬里易義之體分明是於此出竒亦活法之可法者也然此亦不甚緊要因筆謾及之作義要訣
