body:
  text: 書義斷法書類提要臣等謹案書義斷法六卷元陳悦道撰其自題曰鄒次不知何許人書首冠以科埸備用四字蓋亦當時坊本為科舉經義而設者也其書不全載經文僅摘錄其可以命題者載之逐句詮解各標舉作文之窽要蓋王充耘書義矜式如今之程墨而此書則如今之講章後來學者揣摩擬題不讀全經實自此濫觴然元代士風淳樸其程式猶以義理為宗故其書訓釋簡明不支不蔓終勝明人厖雜剽竊之談錄而存之亦足見一代之風氣也書末原附作義要訣一卷為新安倪士毅所輯分冒題原題講題結題四則又作文訣數則尚具見當日程式以世有别本且論文之作不可附麗於經部故著錄於詩文評類而此則從刪焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:efd188d1b465ff7a3e883af2bfe5c38e5a38df5773ce63be0f0c2017fe6eb81c
