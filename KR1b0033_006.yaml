body:
  text: 書義斷法卷六元陳悅道撰周官唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧稽古而建官惟百猶古意之存而官職之簡也內外之體統相承則簡而有要而治之不擾者也內之百揆總百官四嶽總方嶽外之州牧各總其州之諸侯侯伯義次州牧而總諸侯是其制與古不殊而獨得其要可謂和矣未有庶政之和而萬國之民不安也後世官愈煩而政愈擾政愈擾而民亦不寧蓋亦未明稽古之制而亦未得舉要之道耳夏商官倍亦克用又明王立政不惟其官惟其人唐虞官百夏商倍之用人之多乃可致治者夏商權宜之制也有王者明於治體為官擇人不為人擇官者明王立政之經也用權宜之制則觀其㑹通以制其繁簡非曰官制之一定而不可易也審立政之經則擇其實才以列于庶位非曰官職之既多而可妄用也任人乃所以立政立政則所以用又三代之所損益於此可見矣立太師太傅太保茲惟三公論道經邦燮理隂陽官不必備惟其人少師少𫝊少保曰三孤二公𢎞化寅亮天地弼豫一人三公之任大矣三孤特其副二而責任之淺深亦自不同蓋三公坐而論道以經大經燮理隂陽以贊化育不有非常之質固難以任非常之責也三孤範圍天地之化輔弼一人之身三孤苟難於得人則亦可以為三公之副也論道大於𢎞化燮理重於寅亮而一人之身若不敢以纍三公者則輕重淺深之分而國家所以立公孤之本意也冡宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下冡宰之職無所不統而典禮尤邦治之大者也故冡宰雖統率百官以佐王平邦國而地官司徒佐王擾兆民春官宗伯佐王和上下即次之亦如舜之命百揆而於契之敷五教伯夷之作秩宗未嘗不加重也况周之宗伯實兼禮樂之事而功用之極貫幽冥通上下其與司徒皆非若夏秋之卿止各任事也以此二卿繼於冡宰豈非百官之最重而四海之所由均平者乎六卿分職各率其屬以倡九牧阜成兆民天子曰兆民泰和雍熙之治能使之阜厚化成者豈一手足之為烈哉蓋六卿之職各有率屬官以尊而統卑也九牧之治各聽信於六卿以內制外也尊卑有統而內外相維莫不竭力任事承流宣化以休養生息斯民為己任民之阜成不亦宜乎凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其永懷一官必有一官之事一事必有一事之令政令之行否固可以見職事之修廢人心之從違尤足以見本心之公私世之析人圭儋人爵往往慢令而曠官者皆其天理之公不足以勝人私之私故其令不行而官為尸位不知心術之隱微理欲之消長已固已如見其肝肝矣成王之訓官既欲其慎乃令以持守官之敬尤欲其信於此以驗其秉心之公當時之任職居官者其必自味於斯言學古入官議事以制政乃不迷其爾典常作之師學古而以制者前代之法也典常而不易者周家一代之法也二者皆所當學然入官之初已明古制必能不惑於政理而隨事有以裁制之矣蒞官之時益必守家法凡所以尊崇而師法之者又何可一日忘哉學古者言其已然而其爾者期於必然議事者隨事而次之作師則終身行之此成王所以訓官而有官君子之所以為學者固如此也戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱人能詳其所戒則不憂其難立志之初固已期於功崇矣事業之不勤功無由而積此有志而不勤者之所當戒也廣業之勤固可積功矣臨事之不斷則志與勤亦虛用此臨事之不斷者之所當戒也立志以止其始勤果以成其終卿士所掌之職事必先難後易而無有不就調理者寧有後艱之足慮哉位不期驕祿不期侈恭儉惟德無載爾僞作德心逸日休作僞心勞日拙位祿不驕侈於外必有恭儉之實有諸中恭儉之實有於中則其休拙自日異於外蓋有位祿則驕侈自至不期然而然者矣德僞異則休拙自殊亦不期然而然者也是以君子知恭儉之不可僞為尊其天爵而不循於人爵則自然心逸日休之樂而無心勞日拙之苦又豈有矜驕奢侈之失哉推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱匪其人惟爾不任賢有德者能有才者朝廷之上所以相推讓者惟此所以相稱舉者亦惟此推讓在稱舉之先稱舉在推讓之後其相推讓者濟濟相遜可以見氣象之和而政不龎雜其相稱舉也惟賢知賢可以表才能之實而用必得人蓋因舉人之才能而知舉人者之才能王者之知人善任使蓋如此王曰鳴呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁官無尊卑必以敬為主治民者無遠邇可久安長治萬邦之廣有兆民焉民生之永康而民心之永懷是豈可以聲音笑貌治之哉官者治民之官政者治民之政而諸臣之所以輔佐其君者亦惟在於安民蓋舉其詳皆職分內事舉其要則敬之一字而已成王訓官之終篇嘆息而言歷舉其職而一本於敬言有盡而意無窮也君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹茲東郊敬哉孝於親而恭上此言君陳令德之綱也也孝友於家而政施於國此言君德令德之目也齊家而孝於親施政而恭於上至于兄弟以御于家邦東郊之政舉而措之耳然成王之命君陳始稱其德而終勉以敬蓋敬之一字又貫徹孝恭之德而通乎家國之間所謂能敬必有德不可恃其德之能施於政而不思夫政之必主於敬也此成王臨涖君陳尹兹東郊之誥命故其言之拳拳如此昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂周公之留洛毖殷也有師之道所以教之有保之恩所以飬之民之懷德深矣君陳繼之必謹守其所司必率循乎常典必勉力以明公之訓然後民其康乂此以賢繼聖之功效不能不與周公少異然謹職守循常憲於周公之訓盡心力以懋明之民亦稱治而往聖之盛德大業庶幾乎可及也鳴呼周公遠矣勉焉日有孳孳以懋昭周公師保之訓民其庶幾乎至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫周公精微之訓該本末貫幽明非自強不息者不能深體而力行之也蓋世有能潔粢豐盛以感神明者矣未有能至治之馨香也世有能致敬盡禮以告治功者矣未有能明德之馨香也至治舉其成明德循其本顯微闡幽昭然周公之猷訓此其至精至微非日新不已深致敬篤之功者孰能與於斯宜成王舉以告君陳既欲其孜孜而又戒其逸豫也凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草未見聖而若不克見既克聖而終不克由此人情之同然也君子之德風小人之德草草上之風必偃物理之所必然也不惑於人情之同然而真能由周公之訓則不異於物理之必然民亦皆由君陳之訓矣夫遵周公之聖訓化商民之愚頑君陳一篇之大㫖惟在於此成王於此深教其意即人情物理以為喻故以民之不克由者為戒而以風之能動物者為勉君陳於此宜深知所感矣圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹艱者謹其所圖之端繹者紬其所圖之緒方其圖之之初政無大小皆所當謀不可以易心乘之也及其圖之有廢興也出入反覆必與師虞不可以私意專之也以至虞度之稽于衆也庶言雖同尤加思繹又不可以怠心間之也圖於己者復資諸人資諸人者復繹於己然後政不自專而非茍同庶無負於東郊之任矣爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大治民之官其於民之未化也必有忿怒疾惡之意其於民之闡化又有求全之心二者皆君之所當忍而後有濟也然無忿疾無求傋有堅制力蓄之意至於有容德則洪裕寬綽恢恢乎有餘地矣故成王之命君陳首以禁止之辭而終期以遠大之德二者之無與忍如所謂克伐怨欲不行焉至容德之大則可以為仁故濟言事容言德其淺深之不同如此爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福典者君臣父子兄弟夫婦朋友之倫也德者有義有序有别有信之實也大猷者即君臣父子兄弟夫婦朋友之大道也惟敬可以敷五教惟實有德可以感人心以本諸躬行心得之餘不待求之日用彛倫之外者也君陳能至敬以行之躬行以率之則五品不遜者變惡而為善彛倫攸序者日進而升猷成周之民偕之大道一時之風俗如中庸之變則化如堯民之於變時雍一人在上端拱無為而獨膺百順之祥其為福寧有限量哉是則臣以一身明化民之道君以一人享化成之福成王之望於君陳者深矣康王之誥昔君文武丕平富不務咎底至齊信用昭明於天下薄斂庶民而丕平富此文武之廣德也輕省刑罰而不務咎此文武之不務刑也文武務德而不務刑之心推行而底其至兼盡而極其誠其光輝發越昭明于天下則誠之不可掩也至仁之政與至仁之心相為貫通而表裏洞徹真實無僞其於誠明之極功固有不期然而然者矣畢命惟周公克左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧周公有大勳勞于王家其所致謹尤拳拳於營洛邑遷商民一世三十年之後然後教化洽于天下此其忠君勤民之功豈苛焉為之哉今日四方之治平一人之安享人見其寧而不知其所以寧也於是周公之化深矣康王幸今日之蒙業而安思周公之流風善政感今懷古深思化商民之難而周公之所以慎始者正將有望於畢公之成終非敢自以為安而悉付之無為也道有升降政由俗革不臧厥臧民罔攸勸撫世道將隆之運者可以新其政迎人心好善之機者可以導其趨世道之升降亦人心之善惡為之也成周遷殷頑于洛既歷三紀治以三后在周公時世之降也至君陳畢公之時則允升于大猷矣周公之慎始政之初也至君陳之和中畢公之成終則俗革而政亦可革可以見世道之升降善可以示人心之勸畢公乘世變風移之後更化善治商俗漸革放心已收不於此而臧厥臧焉何以使之感激勸慕而撫隆平之運建無窮之基哉惟公懋德克勤小物弼亮四世正色率下罔不祗師言古者大臣不以一身之盛德而忽略於事事物物之微不以四世之元老而簡於容色辭氣之末蓋不矜細行終纍大德而發禁躁妄內斯靜專雖以元老大臣盛德大業之已至而孳孳兢兢不以一事細微之不謹一時之辭色或輕兹乃所以為古之大臣也衛武公耄期入相于周猶以迷亂于政顛覆厥德自警以敬爾威儀慎爾出話自勉可謂聞畢公之風而興起矣資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓康王命畢公以訓商民其言一節深於一節蓋以民資富而不能訓將無以永年而保其富舍德義而為之訓又無以端本而立其大然其所以為訓又非一己之私也稽古訓而已矣能訓於資富之餘大訓明德義之實而又由古訓以明德義之所從出循教化之已然民之從之莫不歷年有永可以一洗其奢麗驕淫之俗民其庶幾乎王曰鳴呼父師邦之安危惟兹殷士不剛不柔厥德允修鳴呼吾讀康王命畢公之書而知其君臣之相與皆不茍於小成也以成周之時四方無虞而康王永懷經邦之謀猶以殷士為安危之所關以畢公之賢懋德克勤而康王期望父師之辭猶有修德而剛柔之迭用蓋天下之治不安則危不可視殷頑為不足掛念也一身之德不修則廢不可使剛柔之或有偏尚也康王既嘆息以自警復誥父師以交警必期天下之常安而相德之益盛其不苟於小成固如此康王命畢公保釐東郊不剛所以保之不柔所以釐之皆實德之用也惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民三后之治商頑民不同時而慎始和中成終之政若出於一時君成於一人此心同也慎之和之成之始終之相濟而表裏之相符此道同也此心此道之同則政愈治先後生民之愈久則澤潤愈深及其成功無有不同者矣三后之成功如天之貫四時生民被澤如水之行地中何幸歟公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂大臣為國家立無窮之基必其治法之足以相傳也為一身垂無窮之聞必其名實之足以相稱也致君澤民傳遠垂後使國家建久長之基業而身亦不失天下之令名是豈可以茍焉為之哉凡其立經陳紀所以為世世子孫慿藉扶持之計者必有己然之成式乂治之成規言而世為天下法行而世為天下則然後王業無窮而令聞亦與之無窮矣書曰自周有終相亦有終其相期於無窮者正如此訓順也成式為治之具也未有無其具而能久其基聞者也罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政先王所成之功烈皆前政相與扶持式克至于今日能盡其心則先王前政之所已為者皆吾之所能為不可以為弗克畏其難而不敢為也能慎其事則先王前政之所已治者皆今日之所當圖治不可以為寡易其事而以為不足為也不畏難而不敢為不易而以為不足為則必與為俱盡而君與臣俱學豈非所謂無窮之基聞哉以畢公之克勤小物其必有以處此矣君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常君牙祖父之功書于太常之旗其與日月同明者人所共見也君牙祖父之竭其股肱之力其相與國家同久者又未必深知也穆王命君牙為司徒推本其乃祖乃父為周世臣先言其心之微而後及於功績之昭著可謂不忘其所自出而益足以勉勵君牙於無窮其㫖深矣𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中司徒之官在於大布五常之教敬和秉彛之則五典則父子君臣夫婦長幼朋友民則則有親有義有别有序有信也以五典和民則其教不出於日用彛倫之外以中正化民心其本實在躬行心得之間反之於身己正而物正求之於心惟中也飬不中此古之大臣以中正立人極而新民之所以止於至善也夫人一身可以檢束而心之隱微未必皆思無邪古人立教必和敬以當然之則不惟可使民無邪行而能使心無邪心非闡教之極功歟夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧小民自傷其艱難不異於天時之寒暑為人上而思其艱難即可保乎民俗之康寧蓋艱難怨咨人情之常雖自以為艱誰而上不知也既已知之矣又不肯思其飢寒之艱而為圖衣食之易此民之所以終於怨咨而未嘗有一人之安也君牙雖為司徒實兼教飬之責其必深明夫擾兆民之責而重圖之矣民生其難思之則不終難蓋天下終無難為之事亦無不可安之民特恐不關念慮未嘗深思之耳其曰民乃寧乃亦難之辭也丕顯哉文王謨丕承哉文王烈啓佑我後人咸以正罔缺文武之道未墜於地其功謨之極盛前後之相承可謂大矣有可大之功謨故有可久之王業其咸以正則無一事不出於正非狹邪之謀逆取之功也其咸罔缺則無一事之不致其周非踈略之謀淺近之功也閎深廣大之功謨自有中正周密之氣象文武之道於此槩可見矣爾惟敬明乃訓用奉若于先王對掦文武之光命追配于前人司徒之職掌五典之教自堯舜以來則然周家之所以訓則自太王王季肇其端所以肇基王迹與夫其勤王家者也自文王武王昭其命所以文謨武烈咸以正罔缺者也君牙為周世臣其乃祖乃父皆嘗為周大司徒今日復世其官必思所以敬明其訓惟敷教無忝於前代則令名亦有全於前人皆非持敬者不能也冏命昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟聰明者文武生成之質齊聖者文武極至之德宜無待於臣人之助矣而小大之臣皆懷忠良惟恐君德之無輔相也忠臣進藥石之言良臣效股肱之助其有輔於一人多矣而侍御僕從必擇正人惟恐近習之有纍聖明也此其不自聖之心常資助於人而左右近習朝夕承弼之職尤致其謹此其聰明之愈遠聖所以益聖也歟聰明者資禀之異齊一則作聖之功也吕刑乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民虞廷人臣治水之功最大水既平矣而尤憂民生之無以食也民既食矣而尤憂民心之無所檢防也九官之命先禹稷而後伯夷穆王之言乃先伯夷而後禹稷豈非伯夷之心因憂民之逸居無教故以三禮正大典又以五刑明天討禮刑兼用皆以齊民使斯民終身安享平治種殖之功是伯夷之身心尤為憂民之切而其功與禹稷同論也三后有恤民之功是以有仁民之功其以三后並稱者豈非三后之同心故三后之成功亦不異歟穆穆在上明明在下灼于四方罔不惟德之勤故乃明于五刑之中率乂于民棐彛虞廷君臣其和敬精白之容己足感發人之善心而無過不及之差猶足以輔人之常性其成德之容中正之法皆足以維持人心於無窮固不以民德之歸厚而廢吾法也此其盛德之光輝與刑罰之精華並行而不相悖豈如後世之淫刑以逞哉書義斷法卷六
