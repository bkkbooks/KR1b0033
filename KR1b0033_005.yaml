body:
  text: 書義斷法卷五元陳恱道撰召誥惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬誕膺天命者必懷深長之憂忠愛其君者必致深長之意今王受命固有無窮之美而亦有無窮之憂也惟命不于常善則得之不善則失之及於此則凡所以格君之心而勉君以敬者其意豈有窮哉惟於敬德則誠實無妄視聽一循乎理好惡用舍不違乎天而天命長保矣然此未易言故召公歎息其辭以言之而又反其辭以明之也周公無逸之書凡七嗚呼召誥之書凡五嗚呼其旨深矣其丕能諴于小民今休玉不敢後用顧畏于民碞其丕能者召公期望之辭王不敢後者召公勉勵之辭能納民於大和則今固休美矣而民之巖險可畏常伏于大和盛美之中恃其己和且美而不汲汲於畏民則人心險於山川殆有可畏者矣書曰天明畏自我民明威此之謂也諴而休者和氣之薰陶也畏民碞者事勢之倚伏也見於今者雖可喜而圖其終者得不長慮却顧思先務之為㥯哉其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休洛邑之作成王所以中立於天下而奠三極也以對于上帝以祀于上下以布政于中土之民蓋自今日始矣然此一人之私謀一時之茍合也天之所以付托者已有成命矣民之所以望治者益為休美矣王猶承天意以治天下則大邑不為虛作而成王之身所以貫通三極者豈不為益美矣夫兩言自時言自是而為三極之主也末言今休言自今而有無窮之美也此召公述周公之言以告成王也王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德以殷御事親近副二于我周御事所以節性而使之進於善也以敬作所動靜云為止於是而不遷所以居敬而為之立其凖也為之薰陶漸染為之品節防間使人有所勉勵而趨善孰若為之視儀聽倡為之端本澄源使人有所觀感而皆安處善哉既言節性又欲其日邁望於殷臣者無窮既言敬作所又言不可不敬德望成王者亦無窮也此所謂一正君而國定所謂其身正不令而行者也宅新邑肆惟王其疾敬德王其德之用祈天永命宅中圖治之初正將為傳遠垂後之計然其所以格天心保天命惟在敬德而已其兩言王其者期之之辭也其終言祈天永命者求之之道也天道不可求而求之者在乎敬德人事必可期而期之者亦惟在於敬德疾敬德者勉之於己不可緩也德之用者祈之於天不可欺也此宅新邑之第一義也其惟王位在德元小民乃惟刑用于天下越王顯居天下之大位者必有首出庶物之大德其聰明冠倫出類拔萃固已異乎人矣下及下民皆刑而用之則而象之普天率土無不觀感興起於下則於王者之德尤為光顯也王者非有意於顯德其所以尊為天子者在德元然有此元德無一事不可為法無一民不與俱新其德之光顯自有不可掩者矣究論王位之所在則惟在德元耳不自知其明明德之功如此也上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命受天永命而丕若有夏欲其過之也勿替有殷惟恐其不及也上下君臣平日之所勤勞憂恤其所期望者亦庶幾其如夏商之歷年至於以小民則自可以受天命且可以受天之永命是民心之係屬猶勝於君臣君臣之憂勤至小之微民能受乎至久之天命小民吾能以之凡師能左右之曰以則永命自能受之此亦必然之理不特為期之辭也洛誥公其以豫萬億年敬天之休拜手稽首誨言大臣之輔君將期以至遠之業賢君之答臣必待以至重之禮蓋周公之誨言將以營洛而告卜也周公之營洛將以豫億萬年而敬天休也天休即休恆吉之兆誨言視豫卜之文非常之盛事建此無窮之丕基安得不以非常之盛禮益其忠告之誨言乎周公曰王肇稱殷禮祀于新邑咸秩無文子齊百工伻從王于周豫惟曰庶有事舉祀典於新邑旦咸秩於無文周家之盛禮也齊百工於宗周尚庶幾其有事周公之盛心也盛禮所行無往不及宅中圖大之初可謂非常之典矣周公之盛心惟率百工以從王欲王自教詔之以庶幾有事所以見禮樂征伐無不自天子出豈如春秋衛國所謂祭則寡人政由寧氏者哉元老大臣德盛禮恭其事君小心於此亦可見矣王若曰公明保豫沖子公稱丕顯德以豫小子掦文武烈奉答天命和恆四方民居師此下成王答周公及留公之辭周公之明保君德以其能稱丕顯德也稱舉而大明其德也其身正蓋隱然有以格君心之非然後以其君發掦祖宗之功係屬天人之心前不愧於文武仰不愧於天俯不怍於人此皆周公之能明其君而非公之自明其德何以致此一説以答天和民串歸掦文武烈謂所以繼志述事惟天人二事耳然掦應天順人之極功必有君臣交勉之盛德君臣之盛德相為輔佑則文武之大烈無不克周所謂永保文武受命民皆此功之積也亦皆此德之驗也惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀既定宗禮則稱元祀而秩無文此洛邑已行之祭禮也德化已行惟夙夜而承祭祀此繼今以後常行之祭禮也厚尊大禮舉秩大祀此八字是古注今合用之臣不以德教為己明勤施以迓太平而紹先志君不以大臣為可恃益加毖祀以奉宗廟而承祭禮蓋不恃其祀禮之已盛而益謹於祀禮之常行其曰夙夜毖祀皆所以飬誠心而端政本非一切仰成而已也成王留周公以治洛其交相勉之意亦可見矣我惟無斁其康事公勿替刑四方其世享享多儀儀不及物凡民惟曰不享惟不役志于享是下之享上皆出於中心之誠也成王之責以安民為政事周公之德以一身為儀刑其曰勿斁曰勿替皆此心之誠而不已者以君臣之同心運不己之誠心是以四方之民無不來享蓋千萬人而一心也四方來享且明於世享蓋千萬世而一心也一心所運無君臣之間則一心所感豈有久近之間哉此二句有君臣相為責難之意周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭此下周公許成王留之辭為人臣止於敬責難於君謂之恭周公拜手稽首以復王命此所以尊祖其君而行吾敬也周公之承命留以保文祖受命民所以責難於君上而大居敬也留治洛邑奉令惟謹深思所以承保文祖受命民及光烈考受命民二句皆為受命民設烈考以下有乂使天下人心之久安文謨武烈之益著此其所以𢎞大責難之恭豈徒在威儀進退之間哉其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績典即典章之文也獻即所謂獻臣也人君恭以接下以恭而倡後王故曰恭先厚於文獻為周家恭敬之令主所以正己待人圖治之本厚也化行中土開萬邦休美之盛治所以宅中圖治之極功也皆周公所以期望於成王之辭故有兩其字然欲期以至治之功必究其出治之原故雖特言其成績而治洛之政一本於王之恭敬其獨惇厚於典章殷民者則其恭先之目耳此周公以治洛之效望成王也豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德人臣信以事上以信而倡後人故曰孚先周家一代文武之成功何往非文祖世德之所及今日洛邑之新政多子御事共厚前人之功信可慰民庶之心矣然非德無以為功也非臣倡之以信非君示之以刑無以殫文祖之德也篤成烈者羣臣之所不敢辭繼世德者君臣之所當勉故周公以孚先自任而以儀刑之成望於昭子蓋必其所孚所刑者無一不盡文祖之德然後可以圖功攸終耳功則兼言文武德則惟文王之德純亦不已故以此自勉而亦以勉成王云此周公以治洛之事自效也多士自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤修己敬神一代相傳之心法代天澤民一代相傳之治法心法合前後而如一即太甲篇中所謂克敬克誠也治法合天人而為一即太甲篇中所謂懷于有仁者也承上下神祗社稷宗廟罔不祗肅蓋其明德之貫通於幽明者至於天之保乂殷殷王之守帝則德之流行與天同功使天下無一民一物之不被其澤則明德之所及愈遠矣周公告殷多士備舉商王之德宜必自其本而言之無逸君子所其無逸先知稼穡之艱難乃逸則知小人之依王敬作所北辰居其所此之謂所君子之止於至善而不遷也農之依田魚之依水此所謂依言小人之得所托而不離也君子之所謂所亦無逸而已矣小小之所謂依亦稼穡而已矣無逸而知稼穡之難則雖安逸之時亦能知民所依而不敢忽所謂以勤處逸也周公作無逸之書以告成王言其所能知其所則必能知所依矣昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年嚴恭寅畏皆敬也敬之所積皆天理之流行固足以自撿律其身而以身為度矣若夫治民之祗懼無怠則其敬心所發見而自不能已享國之悠久無疆亦其天命之在我而仁者必壽治民之敬皆誠心充積之盛享國之久亦天理自然之安周公舉此以見誠之不可掩效之必可期固非強勉於人而責報於天也即嚴恭寅畏四字觀之則中宗之積誠敬久矣厥亦惟我周太王王季克自抑畏文王卑服即康功田功二王之抑畏謙下以持其敬者也人能抑畏則凡所以畏天命畏大人畏聖言無往而不畏矣文王之卑服節儉均以成其敬者也能卑服則凡所以卑宫室菲飲食節嗜好亦無往而不敬矣然二王之抑畏以克自言指其持身之素而言之也文王之卑服以康田功言指其及民之功而言之也將以持身則不敢逸將以及人則不暇逸皆敬之流通而為無逸之令王其所用之不同則所遇之時所居之位有不同耳周家一代相傳之心治寓於治法則無不同也徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民以文王之德備道而全美故文王之政勤身以及民徽柔懿恭所謂文王之德之純也徽柔則極其和能合天下之大和懿恭則純乎恭故篤恭而天下平文王發政施仁必先斯四者蓋惟恐一夫之不獲是以在己愈約治民愈勤謂之咸和萬民則非止小民鰥寡而已然其和順之積中發外誠心之篤近舉遠非盛德至善其孰能與於此哉論文王之仁政非一言可盡尚論文王之盛德則一言足以該之矣自殷王中宗及高宗及祖甲及我周文王茲四人迪哲哲智之明也迪哲則非茍知之亦允蹈之孟子所謂知斯二者弗去是也商之三宗與周文王有賢聖之分而四人皆以迪哲蓋無逸一書專為能知小人之依而言如中宗之治民祗懼高宗之大小無怨祖甲能知小人之依文王之懷保小民惠鮮鰥寡皆灼知其所依而且允迪其所知故以四人迪哲稱也勉勵其踐履之實而開導其聰明之益周公之有望於成王也深矣君奭我聞在昔成湯既受命時則有若伊尹格于皇天在大甲時則有若保衡天欲扶持人之國家則必有維持慿藉之世臣湯之受命有伊尹以格皇天見於咸有一德之書詳矣太甲之時復得伊尹以居保衡之任有以安天下而持其平是伊尹一身歷輔乎聖作明述之君兼盡乎格天保民之事天命之所以延洪王業之所以不墜也尚論商家之天命而枚舉商家之賢佐舍伊尹其誰哉在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤周公備述殷家之相傳枚舉當時之賢相伊陟臣扈之輔太戊克厭天心者也巫咸父子之輔太戊祖乙勤勞王室者也此皆各舉其所長而紀其功用也若武丁時則有若甘盤則紀其舊學之臣而不及傳説豈非問學之本無大於天人之功業者歟古今帝主言學之詳始於武丁甘盤蓋本原之正則功用自𢎞所以善相其君者固不專以一事名也天惟純佑命則商實百姓王人罔不秉德明恤小臣秉侯甸矧咸奔走惟茲惟德稱用乂厥辟天之純佑商家以商家有賢人而實也不信仁賢則國空虛矣惟天佑商家故商實商之所以實則以其中外大小之臣皆秉持稱舉其德不至於曠庶官夫以內之百官百姓與夫王臣之微皆秉持其德以憂君之憂外之小臣與夫藩屏侯甸及奔走服役之人皆惟德是舉以治君之事此其真才實德之賢參錯而列於中外而商之國實矣其實之也以德其所以實見天之命也一時賢才氣類之盛國家氣運之昌茲豈偶然之故哉惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若太顛有若南宮括散宜生見而知之孟子武成注疏及史記亦多載閎夭等事然非事實亦不必屑屑舉其功也文王之德之政顯于西土以至三分天下有其二皆華夏之地文王一身自足以修治而調和之故周公稱其克修和以見惟文王能之耳文王既自能之又何待于五臣之助哉周公舉此以見文王之治中國猶可資于五臣則今日之君奭若之何而可去也至治之極文王能之輔治之人文王亦多有之其止言五人者舉其概若尚父之功亦不與焉以見其不盡紀也亦惟純佑秉德迪知天威乃惟時昭文王迪見冒聞于上帝純佑承上文天惟純佑命之文也秉德承上章百姓王人罔不秉德之文也亦惟者言文王之德亦如殷而略舉其文也天之佑文王純一不雜可謂專矣人以為天命之純佑而秉德五臣獨以為天威之照臨若真知威類之不可犯者然五臣之相與輔佐文王相與昭明其德廣宣其化著見丕冒者無不覆夫豈聞而知之乎純佑之天命其又將專歸乎蓋羣臣雖畏天之威而不能不明文王之德天聽有不可掩則天命終不得辭自天佑之故宜純一如此也君肆其監于茲我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷人不能大其所監則必不能裕其所謀若奭之所當肆監者周公所言之辭也君奭之所當猷裕者前王後王之業也我周文武受命之美實有艱難之責任我周繼王繼述之重實望夫明哲之作則皆君奭所當寬裕其心而逺為之圖者故周公於召公之求去力挽而詳告之能大監於此則必能深謀於彼庶幾可以延洪文武之天命昭示嗣王之凖則艱者不終難而迷者不終惑也前人敷乃心乃悉命汝作汝民極曰汝明朂偶王在亶乘兹大命惟文王德丕承無疆之恤曰者武王之言所以言者武王之心也昔者武王空臆以命召公期之以為民極故其所言既欲明勉以輔嗣王如耕之有偶又欲其亶誠以載天命如車之有馭又復欲其如文王之舊德以丕承無疆之休下輔人君上乘天命遠期祖德傳之無窮其悉以命汝者非敷乃心乎其必自任以天下之重重非作民極者乎蓋武王之所言即武王之敷乃心而言之一節深一節則所謂無所不用其極者也召公於此可以悠然思矣篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾周都西土去東為遠故以日出言當成王時泰和休美之治非二公之棐輔何以及此然文祖之成功未竟四方之政化無窮近而繼志述事遠而布德行化必使文王之功成於不怠海隅之地莫不率從然後為篤輔之極功篤如為信恭之篤勉勉益厚使文謨之丕顯者無不成而極地之載者無不服庶幾可以塞吾二人之責而無負於篤棐之任焉耳又豈止如今日之所觀而已哉惟乃知民德亦罔不能厥初惟其終祗若兹往敬用治民以順治為德若召公者已知民德之有初矣而終之未可保也臣以用治為敬若召公者己知此言之當敬矣而敬之不可已也此召公已留周公飭遣之辭故勉公益持其敬不可不如民德之有常敬順其言而深思天下之用治召公之敬德有終則民德亦有終矣蔡仲之命皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治古之聖賢不敢取必於天命人心之所歸而惟取必於在我之為善蓋事理之當行人情之可欲皆善也以德動天以惠懷人亦善也天命猶有去留人心猶有離合惟力於為善則善之所積即治之同歸無親者親於德無常者懷於惠所謂同歸于治者舉此可以類推而為善之治亦未有大於此也可以善推其得之不善則失之蔡仲之聞斯言也可以善推其所為矣多方爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命人謀之不裕者以其心之不實也人心之不實以其不知天命也苟知天命則必能夾輔介助以治王事而享天命亦必能宅宅畋田以順王道而廣天命竭其人力而循乎天命則事事皆實理而動靜云為之間無有不寬裕者矣寧有欺詐之私而為迫切之謀哉成王伐淮夷而歸作是書以告四國多方亦欲其常畏天命以盡忱裕之道耳其三曷不之辭委婉開導上陳天命下極人事亦可謂忱裕之言矣忱如尚克時忱之忱裕如告君乃猶裕之裕此三言曷不者責其何不如此下文四言爾乃者責其不可如此立政拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公曰鳴呼休兹知恤鮮哉拜稽以盡其禮所以見君位之為尊而將有責任之重也鳴呼以致其嘆所以見用人之為美而實有無疆之恤也王之左右有三宅以任政又有綴衣虎賁以侍衛皆有輔佐承弼之責皆職任之至美而擇選之當謹顧世之知所憂者甚鮮此周公所以慨然興嘆也為人上者烏得以勢任之隆權柄之專而輕用人哉致敬以表天子之尊使知惟辟作福致嘆以言五官之重使知為君之實難此立政之書所以作也古之人迪惟有夏乃有室大兢籲俊尊上帝迪知忱恂于九德之行國勢與人才而俱盛所以為事天之實人才惟九德之是求所以見用賢之實有夏之時天下莫強焉宜無得於人才之助矣而夏王之用心以為天實生賢不翕受而敷施之是為褻天以天視賢則其招徠之意何知己然國家之用不當徒取其過千人之俊而必信求其實有九德之行故用人之際迪知而非苟知忱恂而不輕信凡臯陶所謂行有九德者無不真知其底藴而忱恂於任用此其知人之實行乃所以為敬天之實意而古人有行之者惟夏為然乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟后矣有夏之人拜手稽首以告后致敬以尊其為君之名也言宅乃事至兹惟后矣致告以敘其為君之實也蔡氏之説已盡之矣為人臣止於敬而責難於君謂之恭其尊之以名者非虛文聖人不遍愛而㥯親賢之為務其告之以實者非贅辭自古君臣之相告教臣盡臣道也自古君臣之相安君盡君道也於其君忠告而善道之乃所以導一人於其臣審擇而信任之乃所以安三宅有夏君臣之相與蓋如此亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊湯以七十里升為天子其能大治上帝之明命者豈有他哉能用宅俊也所以能用宅俊能即宅俊也用宅俊則預為儲材所以分職任而垂無窮即宅俊則各就名實所以尊師傳而為矜式此其用人之周尊賢之至非所謂能自得師者歟國家政事之分任無非上帝耿命之流行典禮命討皆其昭昭不可掩者湯出而丕釐之是必有分任其責者矣天下三政總而言之則曰帝命分而言之則曰三衍宅所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德湯之用人至周至密故其治民之功至純至大克即宅俊見前蔡解但以就訓即蓋與洛誥之伻嚮即有僚無逸之即康功田功同義皆使之得其職而著其才也湯之即宅俊實能克之其嚴思而丕式之者所以即宅俊蓋信乎其能用宅俊也尊禮戒就已用未用之人才協和化成在內在外之民俗此其新民之極功可驗用賢之成效非湯不能至此也文王惟克厥宅心乃克立兹常事司牧人以克俊有德克厥宅心能其三宅之心克俊有德能其三俊之德也或云克厥宅心當作克知厥宅心或云克即知字蓋古人言語之相傳或有脫字而以意逆之可也如言克立兹常事司牧人不言凖人舉人舉其重者而知其併及三宅三俊也然題上有三克字蓋惟文王能知三宅之心故能立三宅之事惟文王能知三俊之德故能儲三俊之才言此以見文王之誠能而他人不能也以宅心為君心非是亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基受丕基即下文所謂愛民此承上章言文王之能用宅俊而繼言武王亦如此也武王率循文王敉寧之功故不敢替撥亂反正之才率循文王丕顯之謨故不敢違休休樂善之士才德兼用功謨並著基業之大而蓋大其不以此歟周之王業始於文王而成於武王故謂之並受其所以能並受者以其義德容德之交助也其所以能並用者以其敉功嘉謀之率循也其所以率之者有無窮之才則其所以受之者豈不足建無窮之基哉繼自今我其立政立事凖人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之立政者此篇之名也繼自今者成王為政之一初也俾亂相民和獄慎者三事中之目也立政之要孰有大於三事者乎然必有以知宅心之所順然後君子各得展其所長必有以望君心之所守然後小人不得乘其間隙所謂心純則賢才輔賢才輔則天下治也知賢才之心則衆務畢舉可以為立政之助知吾君之心則終始惟一可以端用人之本自今立政此外無他道也文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹有司之牧夫即司牧也庶慎則國之禁戒儲備天下之事莫重於牧民故於有司之牧夫必訓勑其用命與違命者至於庶言庶獄庶慎所掌各有人文王未嘗侵官也朝廷之事次當慎於出令故惟庶獄庶慎文王罔敢知于兹至於庶言之所以出納亦有不容不知者文王亦非敢盡付之無為也然謂之罔攸兼特不兼其事耳猶知之也謂之罔敢知則初若末嘗知有其事者信任之益專也事之大小已斟酌其輕重而事之行否付之職掌至於文王之敬畏思不出其位之意則流通於國家政事之間非文王不能處之各得其道非周公不能知文王之用心如此也自一話一言我則末為成德之彥以又我受民人君思賢之心見之一話一言而不忘然後治民之功白之惟天惟祖宗而無愧蓋民非我之民乃受之於天於祖宗非成德之彥固無以共治之也知受民之必有所托則必知賢德之不可一日忘是以必終思之而且不敢一語忘之也一語之輕稍有不專任賢者之意則小人乘間而入又烏知賢才進退關於乂民之政如此其重哉末惟如商書之恭默思道夢帝賚豫良弼話言如詩所謂永言孝思永言配命是也繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之文者周家一代治體之所尚惟正者周家治職之所分蓋成王為武王之文子文王之文孫不言武者以見成周盛時禮樂彰法度著郁郁乎文其自今以美矣然一時之文治雖已具舉而官之職守不可以相侵如刑獄禁戒儲備之事皆付之正人以治之不可以一時之快意而或誤之也前言罔兼于庶獄庶慎繼言罔敢知于兹事之大小惟恐獨斷而或有失誤此言經世之文非可以苛察果敢為之文也凡事不明大體而皆欲以身任之者必至於失誤亦非所謂經世之文也自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂立政者必建三宅之官非克宅之不能得其才以居其位俾乂者必兹三宅之助非克繹之不能繹其才而盡其用由繹者由其外以繹其中由其言以繹其心由其德以繹其用細繹用之使之展布四體而各竭其力以事上庶幾可以俾乂而古今王者相傳之治法不外是矣繼自今立政其勿以憸人其惟吉士用勱相我國家立政者今日之新政用人者所賴以共治焉者也然欲成輔相之業則必明取舍之端蓋憸人者吉士之反而治之捷給者必不能勉勉以輔國家也自今立政固朝廷圖新之一初而憸人吉士尤國家理亂之所係故周公之言立政用人勿以示禁止之嚴而惟以示倚任之重藹藹王多吉士其於治國平天下也何有其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以掦武王之大烈兵威之詰治其地有限德業之繼述其意無窮禹迹者九州之地也海表者禹治水之所及也非詰戎兵無以服人心非廣德業無以繼先志然詰姦刑暴之兵至禹迹海表而止覲光掦烈之責所望於後王者豈有己哉耿光者德之著必如親見之大烈者功之成必益發掦之使明者愈明而大者愈大斯亦為立政之要而周公之所以拳拳也太史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中爵刑罰之條例必得中使後王法式而慎用之此蘇司寇之治法也敬畏之心常存使國家久遠而利賴之此蘇司寇之心法也周公立政之書末及庶獄於其終也特呼大史書司寇蘇公之法以為一代作程故不特取其中罰之可用而深取其敬心之常存周公一代維持慿藉所以為有道之長者已在於此烏得不探其心術之微而特書以垂訓萬世哉書義斷法卷五
