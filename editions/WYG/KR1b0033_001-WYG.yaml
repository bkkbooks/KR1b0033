body:
  text: 書義斷法卷一元陳恱道撰虞書堯典曰放勲欽明文思安安允恭克譲光被四表格于上下古今帝王功之極莫如堯徳之盛亦莫如堯論其功而不究其徳非善論聖人者也敬體而明用文著見而思深遠盖論其徳性如此信爲恭而實能譲盖論其行實如此然是六者皆出於自然而得非有所勉強故能被四表格上下所謂放勲者如此也史臣以放勲二字總言其功之極以下文六者析言其徳之成可謂深知聖人而善言徳行者矣克明俊徳以親九族九族既睦平章百姓百姓昭明恊和萬邦黎民於變時雍人以一心具仁義禮智信之徳其徳本大舉而措之天下無不周徧其於宇宙内事亦皆性分内事特有此大徳而莫能明欲明徳而有弗克故無以全其本性之明而充其功用之廣也有帝堯者能明明徳於天下親九族而九族睦章百姓而百姓明和萬邦而民於變時雍盖本立而效自廣體全而用益周其明徳新民之極功如此而惟史臣能推之克明俊徳四字要分曉下六句只是明徳新民乃命羲和欽若昊天厯象日月星辰敬授人時聖人一念之敬貫通乎天人之間故命羲和以順天勤民之事皆以欽敬為主盖順天而不主於敬則其紀數之書占天之器凢日月星辰周天之度安保其無差也勤民而不主於敬則其於四時之序耕穫之候凢民事早晚所關安保其無誤也古今治厯明時至堯而始詳故堯典中以此為第一事而始終以欽敬言之微史臣其孰能明帝堯之盛心分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨和仲占天之所在於西方之昧谷而又餞納日以秩西成之事觀中星以殷仲秋之時使民氣之平夷鳥獸潤澤若獨與勤民育物之功者不知舜之分命羲和奠方測景皆隨地見功無一毫推歩之差故民於秋成皆得享其自然之利以遂其天性之真和仲適當西成之候力穡有秋非謂和仲獨治西方三子者無預於此也亦非謂三子各治一時和仲獨專西成之功也觀帝堯總命羲和之辭意可見矣易兊正秋也萬物之所説也民物之夷毨以此咨汝羲曁和朞三百有六旬有六日以閏月定四時成歲允釐百工庻績咸熈欲成歲功必明閠法欲成治功必資羣臣然百官之信治衆功之皆廣則未有不自治厯明時始也周天三百六十者一歲天運之常數一歲日與天㑹而多五日九百四十分日之二百三十五者為氣盈月與日㑹而少五日九百四十分日之五百九十二者為朔虚而閠生焉此歲功之所由成也自黄帝迎日推策至堯之時而厯法大備然後四時定歲功成百工惟時以凝庻績而治功無有不成者矣厯象日月星辰所以為欽天之第一事而亦放勲之一端也舜典曰重華恊于帝濬哲文明温恭允塞𤣥徳升聞乃命以位四者幽濳之𤣥徳無愧於其位故其終身光華之盛徳無間於其君盖舜之恊帝如堯之則天謂之重華史臣紀其終身之盛徳如此指其發外言之也然其𤣥徳之升聞職位之歴試其徳之積中固已非一朝夕之故至於重華則亦其積中𤼵外之不可掩者耳舜典之書以重華二字提其綱而以𤣥徳四者列其目可謂深知舜者慎徽五典五典克從納于百揆百揆時叙賔于四門四門穆穆納于大麓烈風雷雨弗迷古之聖人其徳業隨地而可見其徳量則與天而相通舜之作司徒總百揆兼四岳職任之無曠而徳業之有成亦其職分之所當為者至於入山林之深遇風雨之變而聰明誠智確乎不亂非甚盛徳何以臻此故非可以尋常功業配之也在璿璣玉衡以齊七政虞廷占天之器以璿飾璣以玉飾衡固非為是過侈也天之日月五星運行不齊而齊其不齊實有宰物者司乎其間是天之政無大於此而聖人裁成輔相之政亦莫先於此其於推歩占驗非聖人之政而天之政也以身代天之政其於占天之器可不慎之重之乎肆類于上帝禋于六宗望于山川徧于羣神聖人一身中兩間而立既已勝天下之重任必思舉天下之重祭然其逐事舉禮必有􅁼禋望祭之異名以順其事隨事定名必合天神地祗人鬼之異等以周其敬如郊祀昊天之祭禮之最重者也次及於時寒暑日月幽宗雩宗則天神無不及矣九州之名山大川望祀之所先者也及於丘陵墳衍與夫先師聖賢則禮無不周矣由始焉之特舉以至終焉之咸秩其輕重先後史臣以數語該之以見聖人承上下神祗而至諴之感神如此五載一廵守羣后四朝敷奏以言明試以功車服以庸五載之内居之廵守者一臣之来朝者四此来徃之禮也來朝之後必聽其言而後功可試考其功而後車服以庸此考績之法也情不可以不洽故禮無不畣賞不可以妄得故功無不勸盖藹然之交孚而昭然言行之可考盖古者君臣之相與如此言必有功功必有賞周禮所謂民功曰庸是也詢于四岳闢四門明四目達四聰舜即位之初開四方之門以来天下之賢俊廣四方之視聽以決天下之壅蔽其於人才之進用人情之隱微固已無不周徧矣然非謀之重臣則人之賢否事之是非孰從而知之故必詢于四岳而後賢路愈廣視聽愈公謹之於謀慮之初而充之於四方之遠豈有舉措之不當而幽㣲之不燭哉咨十有二牧曰食哉惟時柔遠能邇惇徳允元而難任人牧民之責重矣故十二州牧亦皆有知人安民之責然欲安民者必審輕重遠近之勢盖農時在所重而舉遠必自近也欲知人者必審忠邪賢否之别盖所用惟有徳仁人而任人必抗絶也安民各得其要而民無不懐知人各辨其實而邪不干正然後可以為民父母而無愧於司牧之任矣咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇載與采皆事也事功至堯而極盛後有作者豈復有加於帝堯故欲廣其事者雖不可無振起之意深明其事者惟順庻類之常盖百揆之事雖多而一理之順初不在乎紛更激作也舜命九官百揆居其首復咨四岳以舉其人然其所以命百揆之意則於奮揚振起之中不過各順其類而已疇字諸說作衆今只從蔡氏觧帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛唐虞之時豈有不親不遜之事其為此言者慮其逸居而無教而或至此也然舜命契以掌教不疾其民之不率教而敬寛以施教盖敬以持身所謂正已而物正也寛以治民所謂優而柔之使自得之也布之以五教重之以專職而敬謹寛厚之至無一毫忿疾于頑之心唐虞之民所以於變時雍而比屋可封者其不以此歟咨伯汝作秩宗夙夜惟寅直哉惟清禮者敬而已人能敬以直内不使少有私曲而此心真無一毫人欲之汚則可以典秩宗之三禮而交於神明矣宗伯之職帝王所重故舜於此官特為訓戒之辭非若上文之子工朕虞詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和神人之和由於樂聲之和樂聲之和本於斯人心聲之和所謂樂由内心以生者也人心有所之必形於言故曰詩言志既形於言必有長短之節故曰歌永言既有長短則必有髙下清濁之殊故曰聲依永既有長短清濁又必以十二律和之乃能成文而不亂故曰律和聲人聲既和乃以其詩被之八音而為樂可以奏之朝廷薦之郊廟而神人和矣此言樂之極功如此而究其本原皆生於人心此典樂胄子之教必先有以正人心而其所以為教自詩言志始也古有採詩之官而此意正與詩大序相出入咨汝二十有二人欽哉惟時亮天工此舜命九官十二牧之後而以一言該其要也宇宙内事皆人臣之所當勉而實非人工之所能為天功者在天之天而欽者吾心之天也知其所職所事皆所以相天之事則以一心為萬事之原焉其柰何不敬哉盖咨汝二十二人者其目而蔽以一言曰欽者其綱也三載考績三考黜陟幽明庻績咸熈三載考績之後賞罸可以行矣而猶遲囬於三考之久以待其是非賢否之定此聖人從容不廹之意而庻功之所以無不熈廣也天下之事廹促之意多則熈廣之功少唐虞考績功罪明而氣象寛衆功之熈廣恢恢乎有餘裕其不以此歟大禹謨文命敷于四海祗承于帝曰后克艱厥后臣克難厥臣政乃乂黎民敏徳廣文教之敷而又盡責難之恭大禹平生相業於此二語足以該之盖廣文教之敷者臣之所以治天下而盡吾職所當為之事也盡責難之恭者君之所當端政本而動斯人不能自己之機也君盡君道以先乎臣政本既立而人心自化禹之所望於君者如此而所以敬君者亦不越乎此此其精神心術之感有不待敷教而自然樂循理者是以觀史臣美禹之徳而言必觀大禹所以進言此讀禹謨開卷第一之義也稽于衆舍己從人不虐無告不廢困窮惟帝時克稽衆從人聖人之無我也無告困窮聖人之成能也人之一心才有毫髪之私必不能稽衆從人必不能愛民好士雖大舜之樂取人以為善而猶若慊然不足如此者所以不敢自以為能而言惟堯能之雖大舜之謙辭而舜之克艱於此亦可見矣帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君堯與天同徳故為天所命盖堯之徳廣大而包乎天地運行而周乎四海其廣也覆燾而無外其運也行健而不息此大徳也即下文聖神文武之四徳也有大徳者必受天命人心其將安歸乎極天所覆極地所載奄而君之聖人亦何心於此而天命所歸聖人有不得辭者故伯益極言帝徳而終歸於天命亦足以見堯之天徳敉寧而天之惟徳是輔也任賢勿貳去邪勿疑疑謀勿成百志惟熈聖人一心純乎天理方寸之間光輝明白其於百為之慮無不各得其當然姑以此二字言之亦以用人之邪正謀事之是非此其事之大者非胸中湛然事来能明未有不疑貳於用舍之間而蔽惑於謀為之際也是以益之戒舜欲其謹之於用人圖事之初而必本於措心積慮之始豈非端本澄源之論哉帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和徳非徒善在乎有以善其政政非徒法在乎有以飬其民至其所謂飬民者又不特飬其身而且有以飬其心也聖人之於民政教具舉而治定功成不至其極不止此其心術念慮何可一日忘天下而伯益儆戒之言又何可不深慮而勉圖之哉九功惟叙九叙惟歌戒之用休董之用威勸之以九歌隆古盛時於府事順治之餘思為久遠無窮之計雖其戒喻程督之意不可少廢而其所以感動人心使之歡忻鼔舞趨事赴功而不自足又非徒刑責之嚴而已也盖始之九叙惟歌者一本於自然之心而終之勸以九歌者已播於九成之韶樂入人愈深則其功愈遠九功之徳所以皆可歌者夫豈後世所及哉地平天成六府三事允治萬世永賴時乃功唐虞君臣之飬民論其政則必原其所始盖非水土之平無以致天成而治府事也論其功則必要其所終盖非萬世之久無以騐其功而造其極也一時治水之政萬世傳遠之功尚復有加於大禹者哉惟茲臣庻罔或干予正汝作士明于五刑以弼五教期予于治刑期于無刑民恊于中臯陶本士師掌刑之官而五刑之用惟以弼教期望之責在於無刑此其風化之原甚深而禁防之具甚畧當時比屋可封民皆由於中道其好犯上鮮矣夫政者正也有恊中之俗則豈有干正之民臯陶之所謂明刑者盖如此帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重聖人臨御之徳主於寛簡故聖人刑賞之用極其忠厚惟寛簡故其體不煩而不廹惟忠厚故其用刑輕而賞重或曰刑故無小不得為忠厚曰不然也人之有罪其於小而懲之使不流於大惡非忠厚而何哉是非有盛徳者不能是以臯陶不徒論其法而先論其徳也一說聖人盛徳至善粹然在中而善政寛簡無非盛徳之𤼵見是以用法之隂毎得法外意也盖功賞不明無以臨御天下而寛簡之徳常流行乎其中是以善善之意長於惡惡而情之可推功罪之有可疑者莫不有以處之而終歸於厚可以見聖人之政簡而有要寛而不廹深得乎臨御之宜而不失其本心之正臯陶之歸羙舜是以尚論其徳也好生之徳洽於民心茲用不犯于有司好生出於聖人之本心而刑法特出於有司之所掌以吾之心洽民之心優柔漸漬之深豈復有入刑者哉刑法之施雖付之有司而民自不犯有司是士師為虗設而徳之流行皆由内心以生者也執法之意常不足以勝其好生之徳此其本心所以無所壅遏而得行於常法之外者歟俾予從欲以治四方風動惟乃之休刑措不用者聖人之本心化民成俗者大臣之盛羙以臯陶掌刑惟主於弼教其從風而靡者一出於自然故其從欲以治者莫不有自然而然者矣夫尚徳而不尚刑為人者孰無是心其不得以直遂其心者以朝無宣明政化之大臣也有臣如此君得以遂欲治之心而臣得以專化民之羙得不申言以羙之哉成允成功惟汝能克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功允成也功治水之功也禹以一念之誠弭大菑捍大患治定功成未有不以自負而始之克勤克儉終不自以為盛也終之不矜不伐人莫與爭其功能豈非誠者物之終始一有不誠則其於盛徳大業未有不滿假而矜伐豈所以為聖人之純誠哉舜羙大禹之功徳而以成允二字先之可謂能知禹之心矣人心惟危道心惟㣲惟精惟一允執厥中無稽之言勿聽弗詢之謀勿庸心一而已人心則指其𤼵於形氣而言道心則指其根於義理而言也人心難公道心易昧故必精以察之一以守之使道心常為之主而人心聽命焉然後動靜云為信能執其中而無過不及之差矣然無稽之言弗詢之謀又妨政害治之大者故言勿聽勿庸以示禁止之意盖存心出治之本聽言處事之要二者竝行而不悖而内外之所以相資治道之所以無弊也可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願上四句是言君民相期之勢下三句是言至善之理以勢言則反復其辭而已明以理言則非深致其敬無以行之也謹守其所居之位敬修其可欲之善歛而益慎慎而益敬戰兢惕厲以期造於至善而所謂君民相與之勢又有不足言者矣盖人君之所以常持其敬者皆職分之所當然亦天理之本然非特顧畏民嵒而已惟徳動天無遠弗届滿招損謙受益時乃天道以徳之動天者言之則其所感甚遠以道之出於天者言之則其所應甚速所感之遠者極精神心術之通而所應之速者惟在於辭氣容色之際盖虧盈益謙天道之常人能深明其理而思所以自持則其盛徳之感上際下蟠而格天之妙可言矣禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于兩階七旬有苖格禹敬盛徳之言而班師於苗國舜大文徳之敷而舞干羽于兩階盖大臣從諫之速而人主尚徳之深固非有意於服苖民也而七旬之間有苖来格雖其理之必然而亦其事之適然史臣比事而書之盖紀實也臯陶曰若稽古臯陶曰允廸厥徳謨明弼諧史臣稽臯陶廸徳之謨不敢同三聖典謨之體史臣述臯陶陳謨之要亦惟幸一時明良之逢禹聖人也史臣稽古大禹獨以二語稱美乃及克艱之謨於臯陶則不敢同此例直述其廸徳之謨而已矣然臯陶之心即禹之心臯陶之謨不異於禹之謨勉其君以允廸厥徳君盡君道也自述其謨明弼諧臣盡臣道也即其所謂君臣之克艱也此其責難之恭豈有異於禹哉臯陶賡歌首言元首之明繼以股肱之良亦無非相責難之意當以二章並觀之勿謂書體之不同而責難之意有異也慎厥身脩思永惇叙九族庻明勵翼邇可遠在茲脩身齊家治國平天下此一理之貫通然古昔聖賢謹之於修身之初己為久遠之思故推之齊家治國平天下自無遠邇之間此君子之所以先立乎其大者由是舉而措之莫非茲理之貫通也其或脩身而不能慎慎而不能思永則亦苟焉淺近之工夫又烏能善推其所為而造新民之懋功哉臯陶陳廸徳之謨理政如此故於此申言之臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懐之仁知兼舉治天下之急先務無以加之然人不易知非知之明無以成官人之能民不易安非仁之愛無以得黎民之心古者大臣相與講明治天下之道不特舉其要而必思其極故臯陶以知人安民為羙而大禹以知人之哲安民之惠為難反覆究極不至於成能成功不止盖古聖賢之陳謨責難其不茍如此亦行有九徳亦言其人有徳乃言曰載采采古者聖賢相與講明治人之道其初言人之實行有九徳末言其人也繼言斯人之為人有九徳末言其事也言其人則知其有實行之人言其事則知其有實事之騐而始謂之亦終謂之乃言以此見聖賢之患不知人而不嫌於講明之詳也寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞強而義彰厥有常吉哉九者皆盛徳之事非以彼齊此之謂也故皆以而之一字為轉語之辭以此見其成徳之皆全而能不偏者也復以吉哉一語為賛羙之辭以此見其成徳之益彰而能有常者也以此見成徳之人為天下國家用其為天下國家福豈有量哉日宣三徳夙夜浚明有家日嚴祗敬六徳亮采有邦翕受敷施九徳咸事俊乂在官九徳而有其三者日宣而充廣之使之益著九徳有其六者日嚴而祗敬之使之益謹此四句者可以見聖人委曲成就人才之意是以合而受之布而用之有徳者無不事其事而在官者無不展其才也九徳是總言三徳六徳在官是總言有邦有家千人之俊百人之乂是才然所謂才者皆從九徳中出盖惟聖人在上涵飬成就人才之功深是以進於徳而優於才内外百官所以無廢事而亦無不盡之才其以是歟百僚師師百工惟時撫于五辰庻績其凝百僚百工一也但僚有僚友之情相觀而善工有職任之守各奏其功其相共師法乃盛時之氣象故順天以時能建盛時之功業也記曰播五行於四時當時百官及時以趍事而不違天以生事是以治功有成治體不擾盖皆得於平日師友講貫切磋之益故其所成就如此無教逸欲有邦兢兢業業一日二日萬幾無曠庻官天工人其代之二無字皆禁止之辭聖人恭己南面為官擇人豈有逸欲曠官之事而臯陶毎拳拳於此盖憂治危明之意也正已所以律人一毫私欲之萌則一日萬㡬之積必有不謹於㣲者矣用人所以代天任職虛曠其位必有不勝其任者矣故審事㡬者莫先於正己代天工者必謹於擇人而二者之失必嚴為禁止之辭焉天聰明自我民聰明天明畏自我民明畏逹于上下敬哉有土天之視聽自民之視聽以為聰明天之明畏自民之好惡以為明畏此以言天下之一理也人君妙一心之經綸膺民社之付托敬哉一語又所以合天人而一之者也一理通乎上下此至理之貫徹處一身位乎兩間此心之存主處盖始之言天天固自於民終之言敬天乃在人君方寸中此臯陶安民之謨可以究極其理而終歸於一心也天叙有典勅我五典五惇哉天秩有禮自我五禮有庸哉同寅恊恭和𠂻哉民受天地之中以生此事事物物各有當然之則所謂𠂻也即謂典禮也五典有君臣父子夫婦長幼朋友之倫叙五禮有尊卑貴賤等級隆殺之品秩君臣上下斯須不誠不敬則典禮皆失其序必不能正之而益厚用之而有常又何以和其本然之中而順其當然之則哉故必同其寅畏恊其恭敬誠無一間融㑹貫通而後民彛物則各得其正典禮之勅我自我者為益厚而有常矣天命有徳五服五章哉天討有罪五刑五用哉政事懋哉懋哉五等之服自一章以至九章所以章有徳也五等之刑自墨劓以至大辟所以用之有罪者也命徳罸罪之權雖出於君臣而實本於天理國之政事盖無大於此者矣君臣不交致其勉則慶賞刑威之用必有失其當而非天意者臯陶陳安民之謨於其將終反復嘆詠以見古者君臣之用心下盡人事上答天意凢所以代天行權者何可一息之不勉哉益稷安汝止惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休此内外交脩天人交應聖人行事動與天合人心天命相為貫通無感而不應之理一心之運必安於至善之止而慎於未動之先方其未動此心湛然及其事之𤼵也必審其幾㣲處事之施也必擇其安穩處然猶不敢自足復資左輔右弼之臣相與效其忠而成其功内外交修無有不至是以無動動則人歸之天命之矣禹之此言盖𤼵明慎在位之意故必於其出治之原而深明之予欲聞六律五聲八音在治忽以出納五言汝聽樂有六律而後被之五聲有五聲而後播之八音聲音之道與政通故察樂聲者可以知治亂也詩歌恊於五聲而逹乎上下古者陳詩以觀民風故出納人聲者可以知邪正也人聲之精者為言出納五言以恊於五聲則治亂可察律呂可得聞矣予欲聞而汝司聽盖舜之所望於大臣者如此舜典中始於詩言志而後及於聲依永律和聲八音克諧理正如此但未言納五言帝光天之下至于海隅蒼生萬邦黎獻共為帝臣惟帝時舉際天所覆之盛徳莫不被其光華故極地所載之賢才莫不願效其用夫聖人之徳丕冐海隅其蒼然以生者無不在其照臨之中况靈於物而為人秀於人而為士孰不願仕於聖明之朝惟在人主舉而用之耳盖明無覆盆之不照故賢無在野之或遺衣被光華之日久故願仕於治朝之心同非有虞盛世孰能及此故禹特稱帝以羙之也敷納以言明試以功車服以庸誰敢不譲敢不敬應此承上文帝徳而言于以見聖人之進言明功不愆於爵賞而非徒委於爵賞不然何以感動人心歟聖人用賢之道敷納以言而觀其藴明試以功而考其成然後旌能命徳以厚其報盖無言功之不就而亦無爵賞之不酬曲盡其激勸之方而有以興起其敬譲之意相譲於善而相感以敬其於人心天理之真固有油然不能自已者所謂不賞而民勸而况於爵賞之公乎惟荒度土功弼成五服至于五千州有十二師外薄四海咸建五長大禹之功非特荒度土工之為難而水土既平建牧立長之尤不易荒者大而治之既以身親度之地矣弼者因而助之則必隨地以擇人皆所以参錯於内外而維持於久遠矣盖禹平水土之後制為甸侯綏要荒之五服東西南北相距各五千里於其中立十二諸侯以為之師使之相収以紏羣后此所以處十二州之内也五服之外其地薄於四海之濵不在五服五千里之内於其地各建五人以為之長使之相統而覊縻之所以處十二州之外此其規模之詳畧功業之先後雖有不同然非大度土功何以平水患非各建五長何以治民度禹盖自言其輔相之業如此而舜之所言時乃功惟序者復如此也戞擊鳴球搏拊琴瑟以詠祖考来格虞賔在位羣后徳譲下管鼗鼔合止柷敔笙鏞以間鳥獸蹌蹌后䕫奏堂上之樂則以鳴球琴瑟之輕清恊於人聲此其所以格祖考而正羣臣也奏堂下之樂則以管鼗鼔柷敔之偹具間以笙鏞此所以感鳥獸而舞蹌蹌也夫樂與天地同和其感人動物也如此豈謂堂上之樂獨能事祖考化公侯堂下之樂偏能動鳥獸哉盖歌者貴人聲其功效貫通乎幽顯而衆樂迭奏與歌相應其功偏及於動物典樂者必由其序而聞樂者皆極其和究其所以至此者則所謂如天之無不覆燾而非盛徳無以及此也臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉臯陶之言治道無不主於欽臯陶之格君心先有以動其聽盖天下萬事皆本於心而成於敬所謂誠者物之終始不誠無物也臯陶以念哉一語冠於言事之首復以欽哉二語貫於行事之終始其先之以拜稽颺言者又所以重其事而聳其聽也大臣格君之道其委曲詳盡固如此乃賡載歌曰元首明哉股肱良哉庻事康哉明良者君臣之盛徳而康哉者庻事之皆安然必君明而後臣良臣良而後事康端本澄源所當責難於君而舜之作歌乃先言股肱喜哉責難於其臣是以臯陶續帝歌以成其義盖必君臣之交相責難然後於義為備而於歌非為容悅也是則臯陶之賡歌所以勸舜而非以頌舜其所以賡歌者正如此書義斷法卷一
