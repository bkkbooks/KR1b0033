body:
  text: 書義斷法卷三元陳恱道撰商書仲虺之誥天乃錫王勇智表正萬邦纘禹舊服茲率厥典奉若天命天之錫聖人其有猷有為者非常之資聖人之奉天其率而行之者皆有常之典盖天錫勇智無為不成固可以正人心而成王業者矣然皆古今常行之道皆天之所命而非人之所能為者其正萬邦纘禹服即常道也亦天命也豈以智力之有餘而盡用之哉湯誥曰各守爾典以承天休仲虺之誥曰欽崇天道永保天命如斯而已矣仲氏釋湯之慚故言天之錫湯湯奉天者如此惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民惟聖人純乎天理之公故惟聖人能極乎君徳之盛寛仁之徳其謂寛而不失於縱仁而不失於柔其徳之昭著而為信於天下者如此然湯身之之聖人也其本源之地純乎天理無一毫人欲之私而所以用人脩己者莫不各得其當故其盛徳至善民之不能忘也易曰寛以居之仁以行之君徳也其見於臨民者如此盖本之脩己用人者非一日之積矣王懋昭大徳建中于民以義制事以禮制心垂裕後昆盛徳之為法於天下無徃而非中故大業之可𫝊於後世綽然有餘裕後之人君創業垂統皆無以為維持慿藉久遠之計其或可以垂後而終不能恢恢乎有餘裕者皆其明徳新民之學有未至焉者也聖人盛徳既足以建中而又内外合徳無徃非中盖其用力之深明徳之遠事得其宜無一事之非中心得其正無一念之非中中道卓然有立於天下而𫝊後垂後之計於是乎有餘裕矣一説克明俊徳者吾心本然之中制心事者所以合内外而建中聖人之徳全體呈露而妙用顯行體用兼該功力至到如此垂裕自是有餘裕矣湯誥天命非僣賁若草木兆民允殖天理流行付與萬物昭然若草木之光華皆天理也信然使兆民之生殖亦天理也湯誥萬邦曉之以天命之理而騐之於民物之間福善禍滛之天決無毫髪之僣差譬諸草木區以别矣豈有世運之終否而匹夫匹婦不得遂其生哉古今天理善則得之不善則失之得衆則得國失衆則失國以湯之興夏之亡觀之于以見天命之昭昭其自今以徃休飬生息兆民以治以生亦信乎其無可疑者也伊訓古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寜暨鳥獸魚鱉咸若方懋者方見其進而未見其止之意此日新之盛徳也人主一身為天地人萬物之理有日新之盛徳故有位育之極功貫三極而澤及萬物盛徳至善其殷監之不遠者歟今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海嗣厥徳者必先謹其所始立順徳者必善推其所為罔不者縂言其事而惟者直指其要也嗣厥徳者皆當謹之於嗣位之初故以罔不在初言然立愛自親始立敬自長始孝弟乃行仁之本而一理貫通可以擴充而周遍故曰惟親惟長伊尹慮太甲之不謹其初而又慮不知其要将無以推其所為也於是以嗣徳為謹始之戒而以孝弟極終始之功豈非治天下國家之要而無愧於烈祖之成徳者歟先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦茲惟艱哉修人紀者聖人之所以治天下也有萬邦者聖人之所以有萬邦也聖人出而扶持世教立經陳紀徃徃舍己從人以成其徳復急己緩人以新其徳其所以經綸大經立大本者用此道也至於由七十里而有萬邦聖人豈有計功之心哉伊尹於此盖言其積累之難而兢業惕厲之心無一日忘其有天下之始終如此而平天下之要道固不外乎此矣太甲上先王顧諟天之明命以承上下神祗社禝宗廟罔不祗肅天監厥徳用集大命撫綏萬邦明徳即明命也人君顧天明命天監君之明徳存乎目􅊿之間而感應之妙未有若此其速者特以顧諟言以見天理之流行而通於神明莫非至敬之寓以監徳言以見天心眷顧而撫綏民庻莫非至仁之澤盖敬之體根於中而仁之用見於外于以見明命之即明徳而任天地人鬼神之托者不可不自持敬始也湯之學自聖敬日躋始徳之日新又新卒為天命人心之所歸盖特餘事也社稷即地祗此所謂郊焉而天神格廟焉而人鬼享皆神明之所在此湯所以常目在也慎乃儉徳惟懐永圖若虞機張徃省括于度則釋欽厥止率乃祖攸行太甲受病處在於欲敗度縱敗禮一旦改過能以儉徳自待亦足以為久遠之圖矣然天下酬應無窮至善之所止有在非敬無以得其所止非守家法無以知其所止正如虞人之機張省括于度而釋也今日之儉徳永圖知改過矣然遵先王之法而過者未之有也不擇其所當行而法其所已行安知他日無輕𤼵之失而不能持之以久乎太甲中伊尹拜手稽首曰脩厥身允徳恊于下惟明后拜手稽首者臣之禮恭脩己治人者君之徳盛方其君臣上下之容儀拜稽致恭一時之禮已盡矣及其明徳新民之事業隨感而應萬世之令名無窮焉又豈非臣子之至願哉太甲中篇之書作於太甲處仁遷義之後伊尹拜稽首而後言太甲進脩之愈遠益喜之深而期之之無窮也奉先思孝接下思恭視遠惟明聽徳惟聰朕承王之休無斁人主一身上承祖宗之托而下撫人民之衆所以思盡其孝致其恭者何敢不勉然人之一心非視遠則不明非聽徳則不聰所以視思明聽思聰其曰惟者亦思之義尤不可不謹也盖奉上接下尤為一身之所接至於一念之𤼵視聽為先一或蔽其聰明則其於身之所接將不勝其弊故伊尹之言一節深一節雖四者皆係於君徳之羙惡而將順其羙以垂無窮則於視聽尤為切要也太甲下惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠天位艱哉謂之天位者天民鬼神之所托也謂之艱哉者誠敬仁之難盡也以天人鬼神之無常而上下顯㣲之間一有不盡其道則離合之機凛乎在前何可不思其難而循天理之則哉先王惟時懋敬厥徳克配上帝今王嗣有令緒尚監茲哉徳以敬為主敬以時懋為先盖必此心之純一不已而後與天合此商家一代相傳之心法也先王之令緒在此今王之令緒尚監于茲基緒之令羙不獨在王業其盛徳純誠可以上當天心而垂裕後昆皆其緒之羙者能監于此則亦如湯之配上帝其為令緒豈有加於此哉若升高必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始行遠自邇升高自卑此言進徳之有序也善始之意可以占終此言臨政之有初也進徳有序故必自其下者邇者臨政之初故必因其難者危者自下邇者非可一蹴而逕造思艱危者不可一日而不慎也既徃不咎方来可追故伊尹之於太甲既告之以脩己之遠業而復告之以治人之遠功其愛君之意豈有已哉無輕民事惟難無安厥位惟危慎終于始有言逆于汝心必求諸道有言遜于汝志必求諸非道無慢易於臨御之初所以屏人欲之私也必審擇於聽受之際所以循天理之正也屏人欲則嚴為禁止之辭循天理則在乎堅固之力此又伊尹立言之意也上二理字禁止之辭下二必字一循乎公明乎公私之辨然後可以善始而圖其終矣輕率慢易安其危而利其菑皆人欲流行處弗慮胡獲弗為胡成一人元良萬邦以貞人主一心一身至善之所止而萬邦所視以為儀表也非此心謹思無以得其理非此身篤行無以成其事一有不至皆非所以為善之至而為良之元者則天下又何賴焉太甲下篇乃太甲遷善之一初故伊尹深期以遠大之規模四方之標凖勉之以知行之並進庻㡬可以集萬善而立人極焉耳咸有一徳今嗣王新服厥命終始惟一時乃日新代天理物之初固貴乎徳之惟新謹終如始之一乃所以為徳之日新新命之膺與徳俱新固已去其舊染之汚矣日新之功終始常新則其所以日新又新而上當天心者又豈止如今日所觀哉今之新徳新命固可喜而終之日新又新者深可期茲固伊尹之所以拳拳於太甲也大學明徳之章言湯之日日新又日新又復及於其命之維新盖家法之傳遠矣任官惟賢才左右惟其人臣為上為徳為下為民其難其慎惟和惟一百官可無用才徳而大臣必擇其全人盖身為大臣兼有致君澤民之責為臣之所以不易也不難於任用慎於聽察則小人乗間而入不可否相濟終始惟一則君子不安其位此為君之所以為難也臣盡臣道則可以稱選任之意君盡君道則可定正名之分亦各盡其道而已矣徳無常師主善為師善無常主恊于克一蔡氏曰徳者善之摠稱善者徳之實行一者其本原統㑹也徳兼衆善不主於善則無以得一本萬殊之理善原於一不恊於一則無以逹萬殊一本之妙謂之克一者能一之謂也愽而求之於不一之善約而㑹之於至一之理此聖學始終條理之序也朱子曰有吉徳有凶徳必主於善或在彼為善或在此為不善或前日不善今日則為善必湏以此揆度盖因一而後定徳以事言善以理言一以心言恊雖訓合却是以此合彼之合非己相合之合有揆度参騐之意又云有比對裁制之意盖從一流出者無不善恊有齊之意張子曰徳主天下之善善原天下之一俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生因王言之大而知其心之一此由其末而推其本因王言王心之相符而知天禄人心之均安此由本而極言其效也頌聲之相同真若有以俾之則君民之相安者自今其審克之矣俾之者誠之不可掩克之者效之必可期盖伊尹之所望於太甲者如此盤庚古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變世臣舊家之人乃古先王所圖任而相與共政者其人之能其任則奉承君命能不隱匿其指意王所為大敬而用之也其化于外又無過言以惑衆聽民所為丕變而從之也令出惟行上敬下化古先王之用舊人其能勝任如此均為舊人均所任用而奉上化下之心乃有不然者故盤庚特引古先王之盛以見今之不然也若網在綱有條而不紊若農服田力穡乃亦有秋綱既舉而目自張有條理而不紊者上下之相從也種曰稼歛曰穡必勤力而有秋者勞逸之相補也盤庚率民於殷亳其事理甚順其事功可期而當時之民傲上以從康故憚遷而違上所命盤庚喻以漁網之有綱欲其無傲復喻以農田之有秋欲其無從康不怠於奉上不安於小成能近取譬其俱享遷都之利也必矣說命上知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命先知明哲以性分之明言之也君令臣行以勢分之嚴而言之也性分之明既已得之於天而可為法於天下矣則其勢分之嚴所以臨萬邦統百官君庸得已於言乎高宗嗣位之初恭黙不言羣臣咸諫于王不特推其君臨之勢而深羙其明哲之性盖有徳必有言而羣臣將順其羙之辭當如是也乃審厥象俾以形旁求于天下說築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳古昔王者寤寐賢才之心不特取其形象之相似必期於心迹之相親盖形象之似所以求賢不嫌於地之遠而心迹之相親所以親賢不嫌於地之近故以山林巖穴之士一旦舉而加諸上位非以職任尊隆為貴而以朝夕左右為尚庻㡬正論日聞而君徳可成不特想像其形像而已高宗之求傅說史臣盖能紀其事高宗之所命傅說則後世尤不可不究其心也若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨啓乃心沃朕心此承上章納誨輔徳之意而為是言也高宗於進徳之方如金之在鑛如水之望洋如歲之大旱此心未能自盡所望灌溉厭飫之也傅說輔徳之忠如金之作礪如川之作楫如大旱之作霖雨此心不可不盡所當開心而見誠也其引喻則一節深一節其本原則啓心乃可以沃心此大人格君心之事業而高宗之所以為拳拳於説也作礪因其羙質作楫期於遠到至於霖雨則有如時雨化之矣此謂之一節深一節而高宗之所望於説者有如饑渴其亦不外乎此心而已惟暨乃僚罔不同心以匡乃辟俾率先王廸我高后以康兆民嗚呼欽予時命其惟有終高宗命傅説以摠百官輔台徳其於出命之初即相期以遠大之業然相之有僚属即君之有輔相使下焉不能率其属則何以共任致君澤民之事上不能敬君命則何以克全其惟有終之功盖必能敬君而圖惟厥終然後能率属而期於遠到此其上下之相率尊卑之相統不正其身如正人何而所惡於下無以事上高宗命説之初辭其已及此矣惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命以從繩喻從諫君之所以從臣也由克聖而若休命臣之所以從其君也君臣之間非相為茍從亦各盡其道而已矣然從諫之初猶截然規矩凖繩之不可易克聖之後則臣之從君固有超然命令之外者况君命之羙哉祗若休命乃將順其羙之事有不待於繩愆紏謬而高宗之徳進矣傅説復王命之初其所以自任而相期者固如此說命中明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民天者理而已明王之奉若天道順此理而已后王建邦君公設都於其下又承以大夫師長其於君臣上下之分截然不可易也此天道也天之愛民甚矣豈其使一人肆於民上哉其於治國平天下之責凛然不可忽也此亦天道也知其勢分之相承而又知其責任之不易則可與言天道矣此奉天道一言傅説盖將詳言治民之事而以是先之也君臣皆當奉天道其獨稱明王者一人之責尤重也惟天聰明惟聖時憲惟臣欽若惟民從乂説命中篇多言用臣治民之事傅説於此言臣之敬順民之從治豈有他道法天而已矣天之聰明無所不聞無所不見皆至公之理流行乎其間聖人與天合徳亦至公而已至於臣之若而又欽若民之乂而又從乂此則明徳新民之極功而人心天理之同然皆不可厚誣也憲天者聖人之天欽若從乂者人心之天惟治亂在庻官官不及私昵惟其能爵罔及惡徳惟其賢朝廷之上有百官所謂六卿百執事皆是也公卿大夫士布列于朝此爵也亦皆官也官以任事故惟其能爵以命徳故惟其賢分而言之則曰官爵摠而言之則曰庻官惟賢惟能所以治及私昵惡徳所以亂然則任官惟賢才豈容有一官一職之可輕授哉天下事衆君子維持而不足小人敗壊之而有餘此即無曠庻官之意故傅説以庻官摠之非知之艱行之惟艱王忱不艱允恊于先王成徳古今之學皆言行並進𫝊説獨告高宗以為非知之艱而行之艱惟忱誠則行之不艱非一偏之論也盖高宗明哲之資而又舊學于甘盤其知之深矣其曰非知之艱者指其所已知而言也已知而益勉於行則先王之成徳可以脗合盖湯於伊尹能自得師故詩書所載多言其持敬懋徳之實此所以為身之之聖而徳之有成者也王能因其已知而勉於力行則知行俱到可以合於先王之成徳矣說命下爾惟訓于朕志若作酒醴爾惟麯蘖若作和羮爾惟鹽梅爾交修予罔予棄予惟克邁乃訓訓朕志者訓之於心志趨向之初克邁訓者行之於羙質調和之後此盖説命下篇之辭言𫝊説之納諫已行於立志之初矣及其相與之日久調和之功多所以修輔其君非一而已是以所得愈深所以愈力高宗亦自度其力之能非特如訓志之初也盖始之之訓志𫝊説惟恐高宗之不從終之邁訓高宗惟恐傅説之不進諫其所就之淺深於此可見此亦是傅説之進言能迎其初者而善道之故能可否相濟終始無棄直截確當果於力行末意互説王人求多聞時惟建事學于古訓乃有獲多聞所以明當世之務故能有立於事學古訓所以見先聖之道乃能有得於理盖宇宙内事一事皆有一理有非可以私意妄為者是以人能求多聞深知事變皆可隨世以立功名然不舉古訓将無得於事理又何以立大本而經綸大經哉説命下篇傅説為學之功故特稱王以聳動其聽而深究乎人情物理之極可謂善於格君矣求多聞建事是今人皆能如此學古訓有獲則非學古人不足以得此也惟學遜志務時敏厥修乃来允懐于茲道積于厥躬為學之道當遜其志如有所不能當敏於學如有所不及虚以受人勤以勵己此二者所以為學而學之終始不越乎此二者也始之謙抑勤敏則其所修如水之浩浩其来終之堅凝誠實則其於道如水之停含泓深而積聚矣謙抑則徳修而日新允懐則道積而不散来如日知其无積如月無忘其所能也為學之初入道之序也惟斆學半念終始典于學厥徳修罔覺監于先王盛憲其永無愆學固學也教人亦學也學之貫於人己者學之始終也徳之所以不自知其進也學之監于先王者學之凖的身之所以永無過愆也湯之自得師修人紀凢所以修己治人者皆有成法率而行之終身可立於無過之地固可以百世以俟聖人而不惑又豈止如一時之進修而已一念典學以始終言監于先王則萬世而無弊盖昭然成規粹然至善是乃為學之極也成憲凢湯之所言所行皆是所謂世為天下則也監于先王成憲其永無愆惟説式克欽承旁招俊乂列于庻位一代有一代之典憲必遠監于先王而後至於盡善盡羙一官有一官之人才必旁求天下而後可以申用明良盖先王立此成憲為萬世之標凖所謂遵先王之法而過者未之有也羣賢輔此成憲為列位之儀刑所謂臣人克有常憲者也高宗以守家為之君𫝊説以進賢為之相其率先王廸高后也固宜按此一節不與上文相蒙前言為學此言守法人君當為之事而皆不可無人才之助也四海之内咸仰朕徳時乃風股肱惟人良臣惟聖正風化之原能使天下之民皆慕其君之盛徳者傅説既徃之功也竭股肱之力必知良臣之責當致君於聖徳者傅説方来之事也説命下篇專言為學進徳之事及高宗不以四海之仰徳者為可喜而以良臣輔徳為可期傅説亦不以風化之既行自足而益以致君於堯舜者自勉下文言保衡之致君澤民其意固可見矣四海仰徳時乃風如舜之羙臯陶所謂從欲以治四方風動惟乃之休股肱惟人良臣惟聖如臯陶之賡歌所謂元首明哉股肱良哉是也古者大臣之事君大要如此惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民上二句言古今君臣㑹遇之難今適相值則其時之可為矣下二句言人臣致君澤民之責惟爾能克則其才之能為矣以其時之可為而自任以才之能為則明良相逄之機㑹為不虛設而君臣兼盡之事業為益深遠矣不憂其難遇而深責其必能此高宗之所望於傅説而於終篇尤拳拳也若更添説拜稽首至休命則當分三節意以見時之可為惟傅説能為而説之所以能為以其奉休命而敢為書義斷法卷三
