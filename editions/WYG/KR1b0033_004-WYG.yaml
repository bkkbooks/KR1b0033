body:
  text: 書義斷法卷四元陳恱道撰周書㤗誓上惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母合萬物而並育者天地之至徳統萬民而首出者聖人之至誠此理一分殊之説也大哉乾元萬物資始至哉坤元萬物資生萬物之所以生成孰有外於天地者故以天地摠言物固物也人亦物也聖人亦物也此以理之一言之也靈萬物者人之所以異於物亶聰明者聖人所以異於人其位為元后亦不過為民父母不能徧及於物也此以分殊言之也天地無為故理一聖人有迹故分殊能循其聰明之實以㡬於天地之仁其仁民愛物安知不與天地同功特本其初而論之則理一分殊之辨不可以不明而君天下者之仁不偏愛當以愛為先務耳天佑下民作之君作之師為其克相上帝寵綏四方天相民聖人相天皆不過為民而已故君之於民不惟君以長之尤必師以教之不特政事之所加而深明教化之所及凢此者皆以愛民而措之久安長治之域耳盖治而教之以復其性即綏而安之以厚其生此經綸参贊之道非特民之所望於君而正天之所托於君也為人君者豈可謂不能而聽斯民之自為之理者哉㤗誓下惟我文考若日月之照臨光于四方顯于西土日月之照則有光光之極者則為顯文王之盛徳與日月並明然光四方者明之普明顯西土者明之徧及虞芮之質成江漢汝墳之被化中天而照四方者也岐山豐鎬之建都𤼵政施仁之先後肇國而在於西土者也顯西土照者愈光光四方則愈遠武王述文考之徳以誓師可謂善言徳行矣武成列爵惟五分土惟三建官惟賢位事惟能重民五教惟食䘮祭惇信明義崇徳報功垂拱而天下治聖人之興不愛爵土官職以待天下之賢能修學五教三事以正天下之風俗然其於風俗益惇明乎信義於賢才益崇報其徳功教化愈深爵賞愈厚庻官有所激勸而方民無不從化此其所以垂拱無為而天下治人見其一戎衣而天下大定垂衣拱手坐享成功而不知其紀綱之布置意氣之感𤼵有自来史臣紀武王無為之治惟其致此者以終武成之書㫖哉洪範天乃錫禹洪範九疇彛倫攸叙洛書之出也九疇之數而已而禹乃即洛書以明洪範即洪範以為九疇是雖不離乎數而理已行乎其中矣盖古今天下之大法即日用彛倫之大經禹因數以觀理而大法以明箕子即數以明理而大經以正然後歸羙於禹而推本於天所以見理之果不違乎數故人倫天理之所由叙也攸叙者言彛倫之所以叙而彛倫之叙即九疇之叙也初一曰五行次二曰敬用五事次三曰農用八政次四曰恊用五紀次五曰建用皇極天地自然之運孰有大於五行事物當然之理孰有加於皇極聖人明事物當然之理合天地自然之運一身之五事已参乎五行矣而尤厚於人之八政以因乎天合天之五紀以示乎人天人交感極参贊經綸之妙而皇極立矣故五行不言用以見二氣之自然皇極必居中以見一理之當然此洪範九疇之本㫖而㣲箕子不能明其初與其所以用也初一是本文曰五行是叙下皆倣此其次序則先説五行是天運五事八政是人事五紀又是天道天人相間説次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庻徵次九曰嚮用五福威用六極五數居中猶極之居中而四方上下望以取正焉者也正己以立皇極之本稽疑庻徵以行皇極天下之至善而合乎時措之宜然後参之神天以騐其從違示之以禍福以昭其懲勸而皇極之道無不行者矣稽疑是決之鬼神庻徵是騐之天象嚮是勸之五福威是懲之六極聖人之懲惡勸善與天福善禍􅁋相参聖人者天下標凖雖已建極猶婉曲以行之使天下之人皆通乎上下幽明之故而凛然於福善禍􅁋之天此民之所以取正也水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡五行用天地生成之數故論其性稼穡乃人力生成之功故論其徳論其性則天地之生成本於自然論其徳則人力之生成出於使然自然者從㣲而至著使然者𤼵育而暢茂故水火金木惟以曰而於土榖以爰言於是而為稼穡也直言其稼穡而已非以名言貎曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖恭從明聰睿者五事之徳肅乂哲謀聖者五事之用盖人一身皆有當然之則能循其當然之則其於身心動靜云為之間自有不可勝用者矣然則析而言之者如合而言之則敬者徳之聚未有居處恭執事敬而不周於用也此敬所以為學之始終也不思則不能通㣲不睿則不能無不通未有思睿作聖而不能全其徳者也此土之所以寄於四時也此又明疇者立言先後之序也皇建其有極歛時五福用敷錫厥庻民惟時厥庻民于汝極錫汝保極皇極居九疇之中如屋極為極中立而四方之所以取正焉者也然君以極為極而錫民此固上予下之辭至於庻民於汝極而保極亦以錫言何哉盖極者天下之所共由非一人之所得私亦非勢力之所能限量也以極之集福者言之則為上錫下以極之共由者言之則為下錫上上錫下則為皇極下錫上則為汝極盖皇極之君民相與者如此保極者言其常為天下之標凖者也建極而以福與之上錫下也廣矣此謂敷錫保極而終身行之則下之錫上豈不久逺而無弊哉上是為生民立極下是為萬世開太平凡厥庻民有猷有為有守汝則念之不恊于極不罹于咎皇則受之而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極聖人之建立人極於成就人才見之盖天下之人品亦不齊矣聖人於有猷為守之人才念之而不忘於其不恊極不罹咎之中人受之而不拒至於有康和之色為好徳之辭亦皆錫之福禄而誘掖其進是以有才者得以自見中人者足以自容而色言之善者亦皆有所激勸其成就人才轉移風俗之道無所不用其極斯世斯民所以悉為皇極之歸矣夫極者四方之所望而取正者也賢者勉而進常人者亦可以企而及宇宙間無一民不眎以為標凖故曰惟皇之極無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路以言皇極之教必以是為標凖而取正於此也人之一心不中不平則必有作好作惡而失其好惡之正者矣義利界限之不明則必有猖狂妄行而失其所共由之道路矣盖處物為義在物為理道路者皆理之所共由者也好惡之偏不能遵而行之皆物欲蔽之不能行其所當然者耳故言遵義遵道遵路以見人之視此為標凖言王之義王之道王之路以見皇極之所以為標凖其原皆生於人心之私而昧乎天理之正使非有建極之君何以使斯民之㑹極而有所取正哉無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極王道即皇極也本廣大本平易本正道人人可行若大路然惟一念之私反覆蔽錮失其坦然之道無以造於當然之極故皇極之教欲其無偏於己欲其無黨於人無黨於人復欲其無偏於己悉去其傾邪反側之累而共由於公平廣大之途然後天下之民無不㑹極而且歸於極矣㑹者合而来歸者来而至盖必至此而後為極故箕子反復其辭以明之而且以賛詠乎皇極之建天道之成也曰皇極之敷言是彛是訓于帝其訓曰者箕子更端之辭也敷言者敷衍為言不特上文所衍之言凡先聖後聖之所以垂世立教者皆言也然聖賢之所以敷言是天下之常理是天下之大訓非君之訓而實天之訓其所闗係如此而可已於言哉此理此言斯民由之則為彛君師教之則為訓而天道精㣲之藴舉不外此故其言之不可以不敷而以箕子之賛詠皇極復為更端之辭以深明之也凡厥庻民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王踐君師之教而近道徳之光君之所以不遠於人也推父母之恩而居君師之位民之所以不忘其君也父母之愛子甚矣如保赤子心誠求之盖惟恐其教之不孚行之不力而去道之遠也今既聞其教行其道以近天子之光華則其於父母罔極之恩何日忘之豈徒以勢而君臨之哉故箕子明皇極之疇於其將終言民之所行如此而述民之所言如此也平康正直強弗友剛克燮友柔克沈潜剛克高明柔克正直之用一剛柔之用而聖人治民豈不欲相安於無為因其平康而一以正直待之哉以其時俗之不同氣禀之不一不得不委曲以施其剛柔而使終歸於無過不及之道也故強梗者以剛克柔和者以柔克此以剛克剛柔克柔酌其時俗之宜也沈潜潜退者以剛克高亢明爽者以柔克此以剛克剛以柔克柔矯其氣禀之偏也三徳之用陽舒隂歛此民之所以皆恊于中而㑹歸于有極歟王省惟歲卿士惟月師尹惟日歲月日時無易百榖用成乂用明俊民用章家用平康為君臣者皆有闗於天所當深省茍能各省其失得則五者之休咎以時此盖以位之尊卑騐休咎之大小也善言天者必有徵於人各當盡職如歲月日三者雨暘燠寒風不失其時則朝野之休徵皆見此以一理之感應占萬事之太平也天有五行人備五事其責任之重則在王卿士師尹其泰和之運則著於地利人事賢才國家箕子於此盖極言休徴之可考而休咎之有由為人上者可不深省而勉圖之哉卿士以下不言省蒙上文也旅獒明王慎徳四夷咸賔無有遠邇畢獻方物惟服食器用下之獻者各隨其方物上之受者不貴乎異物是可以見聖徳之感人深矣盖其所慎者本人心天理之所同得故其所貢者惟物産日用之常行使其敬徳不足以珍竒為尚遂於耳目之玩者無窮而本於性分之真者愈怠又何以柔遠人而治天下國家哉是以聖人必先慎乎徳持守之深而嗜欲之淺非武王不能慎此徳非太保不能為此言也王乃昭徳之致于異姓之邦無替厥服分寳玉于伯叔之國時庸展親人不易物惟徳其物明王在上四方遠國畢獻方物王者不自私而舉以分賜諸侯是以昭示方物于異姓之諸侯使之無廢其職分寳玉于同姓之諸侯使之益厚其親如分陳以肅慎之矢魯以夏后氏之璜是已上之所以柔遠人者此徳君之所以賜諸侯者此徳諸侯不敢輕易其物而視之者亦惟此徳雖其所賜有同姓異姓之殊方物寳玉之異然徳寓於物人亦以徳視物則一而已矣不役耳目百度惟貞玩人䘮徳玩物䘮志志以道寧言以道接不役耳目以為百度之正所以謹其外也不玩人物以䘮本心真所以謹其中也然至理所寓不越乎日用常行之道摠言其要惟在於内外交飬之功惟内之所飬不至於妄𤼵外之所飬不至於妄受則存飬周遍表裏如一又何至於䘮徳䘮志而循耳目之欲哉西旅獻獒乃役耳目之一事而太保摠言内外交飬之事無一不及亦猶太公丹書之戒于盤盂几杖無不銘之以示警也大誥寜王惟卜用克綏受茲命今天其相民矧亦惟卜用鳴呼天明畏弼我丕丕基寜王武王也卜天意之所寓也寜王遺寳龜而紹天明天之明畏己弼我丕丕基矣今日之有大事休朕卜併吉豈非天之明畏而弼我丕丕基者哉天將定天下之大業故上可以决天下之大疑天之所命所相所弼皆於卜而占之豈以昔之惟卜用可以騐天意而今之惟卜用不足以紹天明哉此東征之師所以質諸鬼神而無疑考之寜王而益信也嗚呼一言成王之所感深矣天閟毖我成功所予不敢不極卒寜王圖事肆予大化誘我友邦君天棐忱辭其考我民予曷其不于前寜人圖功攸終上天閉塞艱難之㑹因以立功而可成此為人上者不可不極卒寜王之圖事也人君化誨誘勸之辭徴之天人而可信此人臣者不可不終寜王之圖功也寜王於武王所立之功則繼其志者在我寜人於武王所用之人終其功者在友邦君不敢不極卒者成王之所以自任於己曷其不于者成王之所以相期於人也反復乎古今参騐乎天人東征之師其可已乎㣲子之命惟稽古崇徳象賢統承先王脩其禮物作賔于王家與國咸休永世無窮以世徳崇湯祀所以存一代典章之舊以客禮待㣲子所以垂萬世久遠之休既徃之統有𫝊方来之休未已盖其尚古之心不惟可慕之先王而公平廣大之心猶可以垂之萬世也尊先王而文獻足徵繼絶世而與國同休稽之古而不悖𫝊之後而有永王者之盛心可見矣乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寛除其邪虐功加于時徳垂後裔先儒以整齊嚴肅為敬則齊之為敬决矣湯之學在於聖敬日躋敬以直内則聖無不通廣無不包淵無不測此其敬徳之積如此膺上天眷命除斯民邪虐之害此其仁功所加如此然成王之命㣲子推本湯徳必自盛徳全善推之于以見功之著在一時而徳之垂者愈遠而愈無窮是以尚論其徳而推本於敬也又按周之命㣲子必推其祖宗之徳而商受之非無一語及之亦可謂厚之至矣予嘉乃徳曰篤不忘上帝時歆下民祗恊庸建爾于上公尹茲東夏有大徳者必得其禄故自極人臣職任之崇有大人者正己物正故能布中外文明之治盖人皆有徳而㣲子獨厚於徳天歆享之民敬順之盛徳之不可忘故建爾于上公然令徳顯顯宜民宜人東夏之尹治當必有可觀者故成王誥命之辭稱其已然而勉其將然國在東方地為中夏治愈明而徳愈厚此成王拳拳之望也建爾上公所以崇徳尹茲東夏所以圖治成王臨遣㣲子之辭期予于治之意盖如此欽哉徃敷乃訓慎乃服命率由典常以蕃王室徃敷乃訓者成王遣㣲子就國之辭也欽哉者敷教之本也服命之不謹不可以訓典常之不率非所以訓率典禮之常以蕃衞之忠其訓教之所由敷者乎欽哉一語其又敷教之本領者乎成王之命㣲子曰庸建爾于上公上公之服九章九命其衮衣誘裳近於天子僣逼之愆常必由之能敬以敷訓則必能慎以輔君敬與不敬之分於此可見康誥克明徳慎罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修明徳慎罰為康誥之綱明徳又慎罰之綱文王之徳見於恤窮用人敬賢至於威其所當威耳明徳之用周而威之用寡康誥詳言其徳盖指其顯於民者言之也文王之徳可以區夏而肇造之初惟聽一二邦之漸修如虞芮之質成江漢之教行是已其尚徳不尚刑之意昭然於天下故其以漸脩治之化悠久而不能已於人心者此盖惟文王能之而皆非有心於天下也今民将在祗遹乃文考紹聞衣徳言徃敷求于殷先哲王用保乂民汝丕遠惟商耉成人宅心知訓别求聞由古先哲王用康保民此武王告康叔以明徳之實也徳無常師其於義理之無窮體用之周徧豈可以一言盡哉近守家法既欲其祗述文考之事紹其所聞而服其徳言矣遠師聖哲復欲其求之殷先王又遠為商耉成人又别求聞古先哲王皆所以探索義理之本原而推廣實徳之功用其紹聞以行文王之言宅心以加教誨之道皆所以修己也用保乂民用康保民皆所以治人也此四語者互言修己治人之事經緯以成文非謂師文王尊商耉止為修己求殷先哲與古先哲止為治人合而觀之則可以語明徳之學矣汝丕遠惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若徳裕乃身不廢在王命無遺商耉以端治本而明化源稽我古人之徳以安萬民而保一國然後此身之理能究其所從出此身之徳能充其有餘可以不墜吾君分土分民之命矣然止能不廢在王命纔可免過而已非以為己是也則康叔之尊賢而稽古𢎞道蓄徳者豈可有一息之不勉而不思王命之重哉乃服為𢎞王應保殷民亦惟助王宅天命作新民殷民之闗係甚重康叔之責任非輕盖𢎞王化以和保殷民者此民也助王室以安宅天命者亦此民也深思夫承宣夹輔之寄而反復乎人心天命之由其必思所以作興鼔舞其民而去其舊染之汙矣以殷民之舊俗而康叔能作新之則夫乃服之事無大於此者此大學克明徳亦引康誥作新民之語以明之也時乃大明服惟民其勑懋和若有疾惟民其畢弃咎若保赤子惟民其康乂明罸以服人心之公戒勑以勉人心之和和則安矣未有安而不治者也人惟心服是以心和是以去疾之心去惡以保赤子之心保善久安長治之計常必由此此猶足以見明徳慎罰之效人心感通之速不可以商俗之汙而謂其不可以安且治也明服如四罪咸服勑懋和如戒之用休勸之以九歌去疾如沉疴之去體保赤子如心誠求之不中不遠皆人心自然之感應也汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌敬典者一國之常法敬以持之固可以裕民矣敬忌者一代之家法敬而有戒慎則庻幾可及乎文王之裕民也而敬敷五教在寛之意皆所以寛容飬其善心而終免於刑罸能如文王之𤼵政施仁羙化行乎江漢彼裕我民豈不綽綽乎有餘裕以此治殷民此則武王建國治民初意庻㡬其可以少慰懌也此武王康誥之書所以終慎罸之義如此而拳拳有望於康叔云爽惟民廸吉康我時其惟殷先哲王徳用康乂民作求爽明也惟思也廸導也求等也明思治民之道而導之於吉康之地固治民者之責然武王之心未嘗不求諸己未嘗不明其徳深思久安長治之本原而殷先哲王為等匹躬行踐履實己足為標凖於天下而非一告之康叔也康誥之書大要言明徳以慎罸故始責康叔以廸民而終身自任以康乂亦可謂深知治本矣民何幸歟酒誥惟曰我民廸小子惟土物愛厥心臧聰聽爾祖考之猷訓越小大徳小子惟一此言文王之民其風俗之厚如此故其徳業之成如此也然斯民之相誥詔毎於小子之時導之以恒産恒心是以能承祖訓而聰聽之於徳之謹告之以徳無小大是以能視大徳而惟一教民毎於小子之時而成徳由於小徳之積盖教民者不至於後時進徳者能成其大徳所謂廸小子猶三代所謂小學之教也所謂小大徳猶商書所謂爾惟徳罔小也若以謹徳為小徳而不思其為大徳之積豈文王之民所以教小子者哉茲乃允為王正事之臣茲亦惟天若元徳永不忘在王家事以人事言徳以天徳言臣之於君有一職則必有一事而正者所以治之也至於元徳之盛大與天同功則為天徳而王家永不忘矣盖正事者人能為之元徳則天亦順之其永不忘於王家者乃世臣徳與國家同休者非特各治其事而已也妹土之臣能不荒於酒徳以各正其事可謂盡臣道矣而武王所期之遠不至於與天合徳與國家同休不止盖君子愛人以徳而期於成就徳業如此在昔殷先哲王廸畏天顯小民經徳秉哲自成湯至于帝乙成王畏相惟御事厥棐有恭古今言敬惟畏字最切盖其始也一念之敬畏廸行於天民人己之間所以交致其敬也其終也一堂之敬畏貫乎君臣輔弼之間所以交致其敬也商先哲王所以自治者如此而君臣交修純一恭敬賢聖之君六七作莫不皆然盖始猶以一身持循之常法其終則為一代相𫝊家法矣奚至於縱酒敗徳哉經徳者修己也秉哲者用人也梓材以厥庻民暨厥臣逹大家以厥臣逹王惟邦君為政不難不得罪於巨室巨室大家所謂係属人心者固不可不以民之情逹之大家也率土之濱莫非王臣君能制命是以臣皆承命尤不可不以臣民之情逹之王也國之政有臣有民其始已逹之大家矣總而言之何徃非臣其情可不逹之王乎諸侯承王命以牧民中立於君臣之間不以臣民逹大家無以示一國之儀刑不以臣民逹王者無以正一人之體統斟酌於人情之宜而歸尊於王朝之重武王封康叔之初拳拳及此亦可謂深遠之慮矣巨家所謂故國世臣孔子所謂卿大夫邦家也王其效邦君越御事厥命曷以引飬引恬自古王若茲監罔攸辟引飬引恬者武王責效於邦君御事之新命也罔攸辟者自古王者建牧立監之初意也引掖斯民於安飬生全之地惟在於仁邦君與皆有責焉開置監國於畿内所封之地不在於法此牧監之所當謹也武王封康叔於衛三篇之書皆以保民而主慎罰然民庻者諸侯羣臣之所共理而刑罸者監牧之所得專故於三篇將終之時言其總命諸臣之意如彼而究其立監之意如此何至輕用其法而有乖於仁哉惟曰若稽田既勤敷菑惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹雘稽治敷菑廣去草也疆畔畎渠也塗塈泥飾也梓良材可為器也雘采色也武王之封康叔於三篇告戒之終而喻以三者農工之事若分而言之則敷菑以喻除惡垣墉以喻立國樸斵以喻制度武王之所已為也疆畎塈茨丹雘則望康叔以成終云耳若合而言之則封國之初先欲除惡之廣諸惡既除在於立國之堅然後正其制度紀綱加以修餙潤色而治國之道終矣此又一節深於一節而是書之所以長於譬喻也今王惟曰先王既勤用明徳懐為夾庻邦享作兄弟方来亦既用明徳后式典集庻邦丕享此以下羣臣進戒之辭如召誥洛誥所云錯簡在此亦不知其為何人作然其為進戒成王之辭無疑也今王之所言惟當效先王文武之所為先王勤用明徳以懐諸侯皆夾輔王室以享上復如兄弟之親方方而来視效吾君之明徳盖明徳之極功也今之為后者亦式舊典而已矣舊典者何也明徳而已矣明徳無君臣之間故上作而下應明徳無古今之間故前作而後述昔也庻邦享而今也庻邦丕享盖亦徳之所傳愈遠而所感愈深耳詩曰儀刑文王萬邦作孚其是之謂乎皇天既付中國民越厥疆土于先王肆王惟徳用和懌先后迷民用懌先王受命以今日之廣土言之則天固悉付以中國民矣於中國之中而猶有迷民今王可不務徳而思有以和懌先后之哉和之使不乖懌之使不怨先後之以左右民是非今王之民乃先王所以受命于天之民也盖商俗迷惑染惡之民自今日而歸於徳化則克受天命之先王庻㡬其可以少慰而天之所以付中國民者始可無負也己若茲監惟曰欲至于萬年惟王子子孫孫永保民己者辭之終也若茲監者意之所未終也人臣之進戒於君所以祈天永命者言有盡而意無窮今徃何監非欲其萬年惟王而且與子孫常保其民乎盖萬年者一身之壽可以君臨天下子孫者一代之傳常永保其民所欲之深所期之遠故其所言之益切而所監之不違也所謂若茲監者亦於上文明徳祈天之事而言耳書義斷法卷四
